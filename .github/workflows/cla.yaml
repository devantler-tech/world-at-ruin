name: CLA

# The CLA gate (AGENTS.md, Licensing): external contributions can only be merged once their
# author has signed CLA.md — copyright assignment with an exclusive-licence fallback. Trusted
# first-party authors are allowlisted below. contributor-assistant never checks out or executes
# PR code, which is what makes pull_request_target safe here — never add a checkout of the PR
# head to this workflow. Signatures are recorded on the `cla-signatures` branch: that branch is
# a permanent legal ledger — never delete it.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-gate:
    name: CLA gate
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issue_comment' &&
        (github.event.comment.body == 'recheck' ||
         github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
      github.event_name == 'pull_request_target'
    steps:
      - name: Require a signed CLA from external authors
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/devantler-tech/world-at-ruin/blob/main/CLA.md
          branch: cla-signatures
          allowlist: devantler,dependabot[bot],renovate[bot],github-actions[bot],coderabbitai[bot]
