name: CI

on:
  pull_request:
  merge_group:
  # Push runs exist so every merge leaves a canonical, findable macOS .app
  # artifact on main (merge_group artifacts are buried in queue runs).
  push:
    branches: [main]

permissions:
  contents: read

env:
  GODOT_VERSION: 4.7.1
  GODOT_SHA512: 4ccdab7a48eeccbe8819a2fc1f6262f8d72065d98601bcb3743fcbd7ebd39f373758a788ee3293a05ec5b2c48538266c437404312e372225cd2df273945a2de9
  # macOS universal editor + export templates, same SHA512-SUMS.txt provenance
  # as GODOT_SHA512 above.
  GODOT_MACOS_SHA512: a5c6443e193829de9a3237b57ef5e01c23839888900e241543da0dd4bac1050125e19469f0cca9a9958ac346070d98cab8e5d6aee16b181c6d06cda86bd07224
  GODOT_TEMPLATES_SHA512: afcc83d8d3d298038f19c58744a0d660fa75dd4baa33cb55d1011bb2565a2a8c2381728924564cb909e37c205a23f21b521b23bd057993afd43ae4da0b2f9d47

jobs:
  client-smoke:
    name: Client smoke boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the ledger append-only check diffs against the base
          # commit, which a depth-1 checkout cannot reach.
          fetch-depth: 0
      - name: Version ledger is append-only (no-resets law)
        # The in-game guard anchors the required fixture range to
        # tests/data/shipped_recipe_versions.txt, but a checkout-local file
        # can be edited in the same change that lowers RECIPE_VERSION. CI is
        # the immutable anchor: against the BASE commit, ledger lines may
        # only ever be added — removing one is declaring shipped saves
        # disposable, which the product law forbids.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          LEDGER=client/tests/data/shipped_recipe_versions.txt
          if [ ! -f "$LEDGER" ]; then
            echo "::error::$LEDGER was deleted — the forward-only version ledger must exist"
            exit 1
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the ledger"
            exit 1
          fi
          # Compare PARSED integer sets, not raw diff lines: the runtime
          # guard strips whitespace, so an indented entry is a valid version
          # whose deletion a line-anchored grep would miss.
          extract='s/^[[:space:]]*\([0-9][0-9]*\)[[:space:]]*$/\1/p'
          git show "$BASE_SHA:$LEDGER" 2>/dev/null | sed -n "$extract" | sort -un > /tmp/ledger-base
          sed -n "$extract" "$LEDGER" | sort -un > /tmp/ledger-head
          removed=$(comm -23 /tmp/ledger-base /tmp/ledger-head)
          if [ -n "$removed" ]; then
            echo "::error::Shipped version(s) removed from $LEDGER ($(echo "$removed" | tr '\n' ' ')) — shipped saves are never disposable (no-resets law)"
            exit 1
          fi
      - name: Golden fixture contents are append-only (no-resets law)
        # The in-game guard validates each golden against the CURRENT build, so
        # a PR that removes a shipped shape/bone/name from a golden AND from the
        # code together passes green while stranding a real save that used it.
        # CI is the anchor: against the BASE commit, a golden's data leaves may
        # only ever be ADDED to — never removed or changed (the comment prose is
        # exempt). New shapes append to a golden; shipped ones are permanent.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present — cannot verify golden fixtures"
            exit 1
          fi
          # Scalar leaves as sorted "path=value" lines, minus the prose comment.
          leaves() { jq -S -r 'paths(scalars) as $p | select($p[0] != "comment") | "\($p|map(tostring)|join("."))=\(getpath($p)|tostring)"' | sort; }
          fail=0
          for f in $(git ls-tree -r --name-only "$BASE_SHA" -- client/tests/data \
              | grep -E 'golden_recipe_v[0-9]+\.json$'); do
            if [ ! -f "$f" ]; then
              echo "::error::$f was deleted — a shipped historical save is never removed (no-resets law)"
              fail=1; continue
            fi
            git show "$BASE_SHA:$f" | leaves > /tmp/gold-base
            leaves < "$f" > /tmp/gold-head
            removed=$(comm -23 /tmp/gold-base /tmp/gold-head)
            if [ -n "$removed" ]; then
              echo "::error::$f removed or changed shipped entries (no-resets law): $(echo "$removed" | tr '\n' ' ')"
              fail=1
            fi
          done
          [ "$fail" = 0 ]
      - name: Install Godot (pinned, checksum-verified)
        run: |
          curl -fsSL -o godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          echo "${GODOT_SHA512}  godot.zip" | sha512sum -c -
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
      - name: Headless import + class-name scan
        # --import alone never writes global_script_class_cache.cfg, so scene-arg
        # runs (the regression tests) fail to resolve class_name types and hang.
        # The headless editor pass performs the full scan, imports, and writes it.
        # pipefail: without it, `| tee` masks a crashing godot behind tee's 0.
        run: |
          set -o pipefail
          godot --headless --editor --quit --path client 2>&1 | tee import.log
      - name: Smoke boot (120 frames)
        run: |
          set -o pipefail
          # --path is REQUIRED: the bare positional form silently boots NO
          # project (verified on 4.7.1 — project manager instead, zero res://
          # loads) and the error grep then passes vacuously. The BOOT_OK
          # marker printed by main.gd is the positive proof the world
          # actually built; pipefail keeps a crash from hiding behind tee.
          godot --headless --quit-after 120 --path client 2>&1 | tee smoke.log
          if ! grep -q "BOOT_OK" smoke.log; then
            echo "::error::Smoke boot never reached BOOT_OK — the project did not actually boot"; exit 1
          fi
          if grep -qE "SCRIPT ERROR|^ERROR" smoke.log import.log; then
            echo "::error::Errors during headless boot"; exit 1
          fi
      - name: Save-fixture guard (every historical save loads with zero loss)
        # THE product-law surface (no-resets law, issue #36): its own named
        # step so a stranded save fails loudly here, never buried in the
        # per-stage loop below.
        run: |
          set -o pipefail
          if ! timeout 180 godot --headless --path client "res://tests/save_fixture_guard_test.tscn" 2>&1 | tee save_fixture_guard_test.log; then
            echo "::error::save_fixture_guard_test failed or timed out (180s) — a historical save no longer loads with zero loss"
            tail -40 save_fixture_guard_test.log
            exit 1
          fi
          if ! grep -q "TEST PASS" save_fixture_guard_test.log; then
            echo "::error::save_fixture_guard_test exited 0 without reporting PASS"
            tail -40 save_fixture_guard_test.log
            exit 1
          fi
      - name: Regression tests
        run: |
          set -o pipefail
          for t in unstick_test surface_consistency_test cave_system_determinism_test world_gen_determinism_test character_determinism_test humanoid_kit_test character_factory_test character_persistence_test save_path_seam_test equipment_composition_test skin_layer_test npc_recipe_gen_test npc_population_test starter_cave_test creature_kit_test creature_factory_test creature_population_test interaction_test recipe_type_guard_test telegraph_shapes_test update_decision_test discovery_test exploration_rewards_test; do
            if ! timeout 180 godot --headless --path client "res://tests/${t}.tscn" 2>&1 | tee "${t}.log"; then
              echo "::error::${t} failed or timed out (180s)"
              tail -40 "${t}.log"
              exit 1
            fi
            if ! grep -q "TEST PASS" "${t}.log"; then
              echo "::error::${t} exited 0 without reporting PASS"
              tail -40 "${t}.log"
              exit 1
            fi
          done

  client-export-macos:
    name: Client export (macOS)
    # macOS runner on purpose: Godot's built-in AD-HOC codesign only works on a
    # macOS host, and an unsigned arm64 .app is killed by macOS before it can
    # launch — a Linux-exported unsigned zip would be dead on arrival on the
    # maintainer's Apple-Silicon machine.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # This job uploads an artifact — never let the checked-out token
          # ride along in it (zizmor artipacked).
          persist-credentials: false
      - name: Install Godot (pinned, checksum-verified)
        run: |
          curl -fsSL -o godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          echo "${GODOT_MACOS_SHA512}  godot.zip" | shasum -a 512 -c -
          unzip -q godot.zip
          printf '#!/bin/sh\nexec "%s/Godot.app/Contents/MacOS/Godot" "$@"\n' "${PWD}" | sudo tee /usr/local/bin/godot >/dev/null
          sudo chmod +x /usr/local/bin/godot
      - name: Install export templates (pinned, checksum-verified)
        run: |
          curl -fsSL -o templates.tpz "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          echo "${GODOT_TEMPLATES_SHA512}  templates.tpz" | shasum -a 512 -c -
          unzip -q templates.tpz
          mkdir -p "${HOME}/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mv templates/* "${HOME}/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable/"
      - name: Headless import + class-name scan
        # Same rule as the smoke job: only the headless editor pass writes
        # global_script_class_cache.cfg; exporting without it breaks class_name
        # resolution in the packed scripts.
        run: godot --headless --editor --quit --path client 2>&1 | tee import.log
      - name: Export .app (release, ad-hoc signed)
        run: |
          mkdir -p build
          godot --headless --export-release "macOS" "${PWD}/build/WorldAtRuin.zip" --path client 2>&1 | tee export.log
          if grep -qE "SCRIPT ERROR|^ERROR" export.log import.log; then
            echo "::error::Errors during export"; exit 1
          fi
          test -s build/WorldAtRuin.zip
      - name: Smoke boot the EXPORTED app (60 frames)
        # Boot the artifact itself, not the editor build — proves the shipped
        # .app actually starts (packed resources resolve, signature is valid).
        # pipefail: without it, tee masks a nonzero exit from the app itself
        # (a crash with no matching error line would upload a broken artifact).
        run: |
          set -o pipefail
          unzip -q build/WorldAtRuin.zip -d build/app
          "build/app/World at Ruin.app/Contents/MacOS/World at Ruin" --headless --quit-after 60 2>&1 | tee exported-smoke.log
          if grep -qE "SCRIPT ERROR|^ERROR" exported-smoke.log; then
            echo "::error::Errors booting the exported app"; exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: WorldAtRuin-macOS-universal
          path: build/WorldAtRuin.zip
          if-no-files-found: error

  license-guard:
    name: License guard (no GPL/AGPL in tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Reject GPL/AGPL-licensed content
        run: |
          # The shipped tree must stay proprietary-compatible: no GPL/AGPL
          # licence texts or SPDX identifiers may enter it (AGENTS.md,
          # Licensing). Matches licence declarations, not prose mentions.
          if grep -rniE "SPDX-License-Identifier: (A?GPL|LGPL)|GNU (Affero )?General Public License" \
              --exclude-dir=.git --exclude-dir=.github --exclude=AGENTS.md .; then
            echo "::error::GPL/AGPL-licensed content detected — forbidden in the shipped tree"; exit 1
          fi


  server-ci:
    name: Server CI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The job only builds and tests local Go code — it never needs the
          # checkout token, so don't persist it into .git/config (zizmor
          # artipacked).
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: server/go.mod
          # The zone tick core is stdlib-only, so there is nothing to cache and
          # no go.sum; the module-cache path is enabled by a later child once
          # real dependencies (Agones SDK, gRPC) arrive.
          cache: false
      - name: Format check (gofmt)
        working-directory: server
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "${unformatted}" ]; then
            echo "::error::gofmt found unformatted files:"; echo "${unformatted}"; exit 1
          fi
      - name: Vet
        working-directory: server
        run: go vet ./...
      - name: Test (race detector + tick-determinism)
        working-directory: server
        run: go test -race -count=1 ./...
      - name: Build
        working-directory: server
        run: go build ./...

  ci-required-checks:
    name: CI - Required Checks
    runs-on: ubuntu-latest
    needs: [client-smoke, client-export-macos, license-guard, server-ci]
    if: ${{ always() }}
    steps:
      - uses: devantler-tech/actions/aggregate-job-checks@0f27c13a9785608e0bbf9998777d27761b4de617 # v10.0.2
        with:
          job-results: >-
            ${{ needs.client-smoke.result }}
            ${{ needs.client-export-macos.result }}
            ${{ needs.license-guard.result }}
            ${{ needs.server-ci.result }}
