name: CI

# CI lints, tests and analyses the product on proposed changes. Production
# builds, publishing and distribution live in cd.yaml, which runs on the
# GitHub Release that release.yaml cuts.
on:
  pull_request:
  merge_group:

permissions:
  contents: read

env:
  GODOT_VERSION: 4.7.1
  GODOT_SHA512: 4ccdab7a48eeccbe8819a2fc1f6262f8d72065d98601bcb3743fcbd7ebd39f373758a788ee3293a05ec5b2c48538266c437404312e372225cd2df273945a2de9
  # macOS universal editor + export templates, same SHA512-SUMS.txt provenance
  # as GODOT_SHA512 above.
  GODOT_MACOS_SHA512: a5c6443e193829de9a3237b57ef5e01c23839888900e241543da0dd4bac1050125e19469f0cca9a9958ac346070d98cab8e5d6aee16b181c6d06cda86bd07224
  GODOT_TEMPLATES_SHA512: afcc83d8d3d298038f19c58744a0d660fa75dd4baa33cb55d1011bb2565a2a8c2381728924564cb909e37c205a23f21b521b23bd057993afd43ae4da0b2f9d47

jobs:
  client-smoke:
    name: Client smoke boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the ledger append-only check diffs against the base
          # commit, which a depth-1 checkout cannot reach.
          fetch-depth: 0
          # Read-only job: no push, so the token must not linger in .git/config.
          persist-credentials: false
      - name: Version ledger is append-only (no-resets law)
        # The in-game guard anchors the required fixture range to
        # tests/data/shipped_recipe_versions.txt, but a checkout-local file
        # can be edited in the same change that lowers RECIPE_VERSION. CI is
        # the immutable anchor: against the BASE commit, ledger lines may
        # only ever be added — removing one is declaring shipped saves
        # disposable, which the product law forbids.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          LEDGER=client/tests/data/shipped_recipe_versions.txt
          if [ ! -f "$LEDGER" ]; then
            echo "::error::$LEDGER was deleted — the forward-only version ledger must exist"
            exit 1
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the ledger"
            exit 1
          fi
          # Compare PARSED integer sets, not raw diff lines: the runtime
          # guard strips whitespace, so an indented entry is a valid version
          # whose deletion a line-anchored grep would miss.
          extract='s/^[[:space:]]*\([0-9][0-9]*\)[[:space:]]*$/\1/p'
          git show "$BASE_SHA:$LEDGER" 2>/dev/null | sed -n "$extract" | sort -un > /tmp/ledger-base
          sed -n "$extract" "$LEDGER" | sort -un > /tmp/ledger-head
          removed=$(comm -23 /tmp/ledger-base /tmp/ledger-head)
          if [ -n "$removed" ]; then
            echo "::error::Shipped version(s) removed from $LEDGER ($(echo "$removed" | tr '\n' ' ')) — shipped saves are never disposable (no-resets law)"
            exit 1
          fi
      - name: Save-capability ledger is append-only (no-resets law)
        # update_manifest_test anchors SAVE_CAPABILITY_WRITES to this ledger, but
        # both live in the same checkout: one change can lower the constant AND
        # delete the matching lines, and every in-repo check still passes because
        # the ledger's newest entry falls with it. That test is also in the
        # auto-discovered suite, so `ci-skip.txt` can silence it. CI is therefore
        # the only immutable anchor — against the BASE commit, lines may only be
        # added. A removed capability is a build claiming to write less than it
        # already has, which strands the vaults that hold it.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          LEDGER=client/tests/data/shipped_save_capability.txt
          if [ ! -f "$LEDGER" ]; then
            echo "::error::$LEDGER was deleted — the forward-only capability ledger must exist"
            exit 1
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the ledger"
            exit 1
          fi
          # Parsed integer sets, not raw diff lines — matching the runtime guard,
          # which strips whitespace, so an indented entry is a real capability
          # whose deletion a line-anchored grep would miss.
          extract='s/^[[:space:]]*\([0-9][0-9]*\)[[:space:]]*$/\1/p'
          # Distinguish "absent on base" from "read failed", following the vault
          # ledger below. Absent is legitimate exactly once — the commit that
          # INTRODUCES the ledger — and means an empty base set. Any OTHER read
          # failure must abort: an empty base makes `comm -23` report nothing
          # removed, so swallowing the error would wave through the very deletion
          # this step exists to catch.
          if git cat-file -e "$BASE_SHA:$LEDGER" 2>/dev/null; then
            # Materialise git show FIRST and test its own status, rather than a
            # pipeline whose status is sed's or sort's.
            if ! git show "$BASE_SHA:$LEDGER" > /tmp/cap-base-raw; then
              echo "::error::could not read $LEDGER at $BASE_SHA — refusing to compare against an empty base"
              exit 1
            fi
            sed -n "$extract" /tmp/cap-base-raw | sort -un > /tmp/cap-base
          else
            echo "::notice::$LEDGER does not exist at the base revision — treating the base set as empty (this is the commit that introduces it)"
            : > /tmp/cap-base
          fi
          sed -n "$extract" "$LEDGER" | sort -un > /tmp/cap-head
          removed=$(comm -23 /tmp/cap-base /tmp/cap-head)
          if [ -n "$removed" ]; then
            echo "::error::Shipped capability/capabilities removed from $LEDGER ($(echo "$removed" | tr '\n' ' ')) — a build may never write less than it already has (no-resets law)"
            exit 1
          fi
      - name: Vault ledger is append-only (no-resets law)
        # The progression sibling of the recipe ledger above (#249). Same
        # reasoning: the in-game guard anchors the required vault-fixture range
        # to tests/data/shipped_vault_versions.txt, but that file can be edited
        # in the same change that lowers VAULT_VERSION. CI compares against the
        # BASE commit, where a shipped vault version can only ever be added.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          LEDGER=client/tests/data/shipped_vault_versions.txt
          if [ ! -f "$LEDGER" ]; then
            echo "::error::$LEDGER was deleted — the forward-only vault ledger must exist"
            exit 1
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the ledger"
            exit 1
          fi
          extract='s/^[[:space:]]*\([0-9][0-9]*\)[[:space:]]*$/\1/p'
          # Distinguish "absent on base" from "read failed". Absent is the
          # legitimate case exactly once — the commit that INTRODUCES the ledger
          # — and means an empty base set. A read that fails for any OTHER reason
          # must abort: an empty base makes `comm -23` report nothing removed, so
          # a silent failure here would wave through the very deletion this step
          # exists to catch (fail-open). `git cat-file -e` answers existence
          # without conflating the two.
          if git cat-file -e "$BASE_SHA:$LEDGER" 2>/dev/null; then
            # Materialise git show FIRST and test its own status. `if ! git show
            # | sed | sort` would test SORT's status, not git show's — this run
            # block has no `pipefail`, so a failing read would sail through and
            # leave an empty base set, which is exactly the fail-open this
            # branch exists to prevent.
            if ! git show "$BASE_SHA:$LEDGER" > /tmp/vault-base-raw; then
              echo "::error::could not read $LEDGER at $BASE_SHA — refusing to compare against an empty base"
              exit 1
            fi
            sed -n "$extract" /tmp/vault-base-raw | sort -un > /tmp/vault-ledger-base
          else
            echo "::notice::$LEDGER does not exist at the base revision — treating the base set as empty (this is the commit that introduces it)"
            : > /tmp/vault-ledger-base
          fi
          sed -n "$extract" "$LEDGER" | sort -un > /tmp/vault-ledger-head
          removed=$(comm -23 /tmp/vault-ledger-base /tmp/vault-ledger-head)
          if [ -n "$removed" ]; then
            echo "::error::Shipped vault version(s) removed from $LEDGER ($(echo "$removed" | tr '\n' ' ')) — shipped progression is never disposable (no-resets law)"
            exit 1
          fi
      - name: Attunement ledger is append-only (no-resets law)
        # The LIVE-NAME half of the vault law (#254 review). A golden fixture
        # proves a shipped attunement name survives a round-trip; it cannot prove
        # the game still ACTS on it. Renaming a name and its call site together
        # keeps every in-game guard green while stranding players attuned to the
        # old name. The in-game guard checks fixture+ledger names against
        # SaveVault.KNOWN_ATTUNEMENTS; this step is the immutable anchor that
        # stops the ledger itself being edited in the same breath.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          LEDGER=client/tests/data/shipped_attunements.txt
          if [ ! -f "$LEDGER" ]; then
            echo "::error::$LEDGER was deleted — the forward-only attunement ledger must exist"
            exit 1
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the ledger"
            exit 1
          fi
          names='/^[[:space:]]*#/d; /^[[:space:]]*$/d; s/^[[:space:]]*//; s/[[:space:]]*$//'
          if git cat-file -e "$BASE_SHA:$LEDGER" 2>/dev/null; then
            # Same reasoning as the vault ledger above: test git show's OWN
            # status, not the last stage of a pipeline.
            if ! git show "$BASE_SHA:$LEDGER" > /tmp/attune-base-raw; then
              echo "::error::could not read $LEDGER at $BASE_SHA — refusing to compare against an empty base"
              exit 1
            fi
            sed -e "$names" /tmp/attune-base-raw | sort -u > /tmp/attune-base
          else
            echo "::notice::$LEDGER does not exist at the base revision — treating the base set as empty (this is the commit that introduces it)"
            : > /tmp/attune-base
          fi
          sed -e "$names" "$LEDGER" | sort -u > /tmp/attune-head
          removed=$(comm -23 /tmp/attune-base /tmp/attune-head)
          if [ -n "$removed" ]; then
            echo "::error::Shipped attunement name(s) removed from $LEDGER ($(echo "$removed" | tr '\n' ' ')) — players attuned there would wake in the cave forever (no-resets law)"
            exit 1
          fi
      - name: Wire protocol may not move without a two-phase rollout
        # The manifest publishes the CLIENT's protocol constant as the range the
        # LIVE SERVER accepts, which is honest only while both sides are pinned to
        # one version. update_manifest_test asserts the two constants are EQUAL —
        # but equality survives bumping BOTH in one change, and that is precisely
        # the unsafe rollout: whichever side deploys first strands the other
        # population (a v2 client rejects the live v1 server's frames; a v2 server
        # makes every retained v1 client unreachable).
        #
        # The ADR requires expand-then-contract instead, and that needs the
        # manifest's accepted range to become a CD-supplied input read from
        # deployment state — work that does not exist yet. So movement itself is
        # the gate: this fails on ANY change to either constant, and the fix is to
        # do the rollout design, not to edit this step.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the protocol version"
            exit 1
          fi
          client_pat='s/^[[:space:]]*const VERSION[[:space:]]*:=[[:space:]]*\([0-9][0-9]*\).*$/\1/p'
          server_pat='s/^[[:space:]]*const Version uint16[[:space:]]*=[[:space:]]*\([0-9][0-9]*\).*$/\1/p'
          # Materialise each read FIRST and test its own status, following the
          # ledger steps above: a pipeline's status is sed's or head's, so a
          # failed read would yield an empty value and be reported as an
          # unparseable constant rather than the read failure it is.
          read_at() {
            if ! git show "$1:$2" > /tmp/proto-raw 2>/dev/null; then
              echo "::error::could not read $2 at $1 — the guard cannot verify a rollout it cannot read"
              exit 1
            fi
            sed -n "$3" /tmp/proto-raw | head -1
          }
          cb=$(read_at "$BASE_SHA" client/scripts/wire_codec.gd "$client_pat")
          sb=$(read_at "$BASE_SHA" server/wire/wire.go "$server_pat")
          ch=$(sed -n "$client_pat" client/scripts/wire_codec.gd | head -1)
          sh=$(sed -n "$server_pat" server/wire/wire.go | head -1)
          # Fail closed: an unreadable constant means the guard cannot prove
          # anything, and silently passing is how a guard becomes decoration.
          for pair in "base-client:$cb" "base-server:$sb" "head-client:$ch" "head-server:$sh"; do
            name=${pair%%:*}; val=${pair##*:}
            if [ -z "$val" ]; then
              echo "::error::could not read the $name protocol version — the guard cannot verify a rollout it cannot parse"
              exit 1
            fi
          done
          if [ "$ch" != "$cb" ] || [ "$sh" != "$sb" ]; then
            echo "::error::Wire protocol moved (client $cb→$ch, server $sb→$sh). Both codecs hard-reject every other version, so a simultaneous bump strands whichever population deploys second. The ADR requires expand-then-contract, and the manifest's accepted protocol range must first become a CD-supplied input read from deployment state — see docs/design/distribution-and-self-update.md."
            exit 1
          fi
      - name: Piece-slot ledger is append-only (no-resets law)
        # shipped_piece_slots_test compares the registry to the ledger in the
        # SAME checkout, so a change that edits equipment.json and the ledger
        # row together passes green while stranding every save holding the old
        # slot. CI is the immutable anchor: against the BASE commit a
        # "<piece> <slot>" promise may only ever be ADDED. Because a moved slot
        # yields a different pair, one comm catches removals AND changes.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          LEDGER=client/tests/data/shipped_piece_slots.txt
          if [ ! -f "$LEDGER" ]; then
            echo "::error::$LEDGER was deleted — the forward-only piece-slot ledger must exist"
            exit 1
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the ledger"
            exit 1
          fi
          # Parse to normalised "<piece> <slot>" pairs so indentation or extra
          # spacing can never hide a dropped or re-pointed promise. A ledger
          # absent from the base (this PR introduces it) yields an empty set.
          extract='s/^[[:space:]]*\([^#[:space:]][^[:space:]]*\)[[:space:]][[:space:]]*\([^[:space:]][^[:space:]]*\)[[:space:]]*$/\1 \2/p'
          git show "$BASE_SHA:$LEDGER" 2>/dev/null | sed -n "$extract" | sort -u > /tmp/pieceslots-base || : > /tmp/pieceslots-base
          sed -n "$extract" "$LEDGER" | sort -u > /tmp/pieceslots-head
          changed=$(comm -23 /tmp/pieceslots-base /tmp/pieceslots-head)
          if [ -n "$changed" ]; then
            echo "::error::Shipped piece-slot promise(s) removed or re-pointed in $LEDGER ($(echo "$changed" | tr '\n' '; ')) — a recipe persists equipment as slot->piece, so moving a shipped piece strands saves and needs a player-visible deprecation (no-resets law)"
            exit 1
          fi
      - name: Piece-layer ledger is append-only (no-resets law)
        # Same anchor as the piece-slot ledger above, for the layer a piece is
        # worn on (#246). A region holds one piece per layer, so flipping a
        # shipped piece's layer makes every save that recorded it alongside
        # another piece in that region fail validation. Layer is deliberately
        # NOT written into saves, so nothing in a save file would reveal the
        # change — the ledger is the only place the promise is visible.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          LEDGER=client/tests/data/shipped_piece_layers.txt
          if [ ! -f "$LEDGER" ]; then
            echo "::error::$LEDGER was deleted — the forward-only piece-layer ledger must exist"
            exit 1
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the ledger"
            exit 1
          fi
          extract='s/^[[:space:]]*\([^#[:space:]][^[:space:]]*\)[[:space:]][[:space:]]*\([^[:space:]][^[:space:]]*\)[[:space:]]*$/\1 \2/p'
          git show "$BASE_SHA:$LEDGER" 2>/dev/null | sed -n "$extract" | sort -u > /tmp/piecelayers-base || : > /tmp/piecelayers-base
          sed -n "$extract" "$LEDGER" | sort -u > /tmp/piecelayers-head
          changed=$(comm -23 /tmp/piecelayers-base /tmp/piecelayers-head)
          if [ -n "$changed" ]; then
            echo "::error::Shipped piece-layer promise(s) removed or re-pointed in $LEDGER ($(echo "$changed" | tr '\n' '; ')) — a region holds one piece per layer, so flipping a shipped piece's layer strands saves and needs a player-visible deprecation (no-resets law)"
            exit 1
          fi
      - name: Golden fixture contents are append-only (no-resets law)
        # The in-game guard validates each golden against the CURRENT build, so
        # a PR that removes a shipped shape/bone/name from a golden AND from the
        # code together passes green while stranding a real save that used it.
        # CI is the anchor: against the BASE commit, a golden's data leaves may
        # only ever be ADDED to — never removed or changed (the comment prose is
        # exempt). New shapes append to a golden; shipped ones are permanent.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present — cannot verify golden fixtures"
            exit 1
          fi
          # Scalar leaves as sorted "path=value" lines, minus the prose comment.
          leaves() { jq -S -r 'paths(scalars) as $p | select($p[0] != "comment") | "\($p|map(tostring)|join("."))=\(getpath($p)|tostring)"' | sort; }
          fail=0
          for f in $(git ls-tree -r --name-only "$BASE_SHA" -- client/tests/data \
              | grep -E 'golden_(recipe|vault)_v[0-9]+\.json$'); do
            if [ ! -f "$f" ]; then
              echo "::error::$f was deleted — a shipped historical save is never removed (no-resets law)"
              fail=1; continue
            fi
            git show "$BASE_SHA:$f" | leaves > /tmp/gold-base
            leaves < "$f" > /tmp/gold-head
            removed=$(comm -23 /tmp/gold-base /tmp/gold-head)
            if [ -n "$removed" ]; then
              echo "::error::$f removed or changed shipped entries (no-resets law): $(echo "$removed" | tr '\n' ' ')"
              fail=1
            fi
          done
          [ "$fail" = 0 ]
      - name: Ability ledger is append-only (no-resets law)
        # A mastered ability can never vanish from a player. The in-repo test
        # checks the ledger against the CURRENT build, so a PR that deletes an
        # ability file AND its ledger line together would pass green while
        # stranding a save that referenced it. CI is the anchor: against the
        # BASE commit, ability ids in shipped_abilities.txt may only ever be
        # ADDED — never removed (the comment prose is exempt).
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          LEDGER=client/tests/data/shipped_abilities.txt
          if [ ! -f "$LEDGER" ]; then
            echo "::error::$LEDGER was deleted — the forward-only ability ledger must exist"
            exit 1
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the ability ledger"
            exit 1
          fi
          # Compare the set of non-comment, whitespace-stripped ids: the runtime
          # reader strips whitespace, so an indented id is a valid entry whose
          # deletion a raw line diff would miss.
          ids() { grep -v '^[[:space:]]*#' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' | grep -v '^$' | sort -u; }
          # A ledger absent from the base revision (the PR that introduces it) is
          # an EMPTY base, not an error — otherwise the introducing PR could never
          # merge. Guard the read so it is intentional, not shell-strictness luck.
          if git cat-file -e "$BASE_SHA:$LEDGER" 2>/dev/null; then
            git show "$BASE_SHA:$LEDGER" | ids > /tmp/ability-base
          else
            : > /tmp/ability-base
          fi
          ids < "$LEDGER" > /tmp/ability-head
          removed=$(comm -23 /tmp/ability-base /tmp/ability-head)
          if [ -n "$removed" ]; then
            echo "::error::Shipped ability id(s) removed from $LEDGER ($(echo "$removed" | tr '\n' ' ')) — a mastered ability is never disposable (no-resets law)"
            exit 1
          fi
      - name: Category power budgets are frozen (no-power-inflation law)
        # "Mastery unlocks new arsenals, never more damage." The registry test
        # checks each ability's power against the CURRENT ledger, so raising an
        # ability AND its category budget together would pass green — the arsenal's
        # power ceiling would creep up with no undo. CI is the anchor: against
        # the BASE commit, a role|effect=power line may only ever be ADDED — never
        # changed or removed (the comment prose is exempt).
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          LEDGER=client/tests/data/shipped_class_power.txt
          if [ ! -f "$LEDGER" ]; then
            echo "::error::$LEDGER was deleted — the frozen power-budget ledger must exist"
            exit 1
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the power-budget ledger"
            exit 1
          fi
          # sed strips whitespace WITHIN each line; `tr -d` would delete the
          # newlines too and collapse the whole ledger into one blob, which
          # silently disables the duplicate-key check and makes a legitimate
          # new-category ADD look like a changed line.
          # `|| true`: grep exits 1 on no-match, and under `set -o pipefail` a
          # ledger that is empty or comments-only would abort the step with no
          # diagnostic. As a pure filter, "no pairs" is a valid result.
          pairs() { grep -v '^[[:space:]]*#' | sed 's/[[:space:]]//g' | grep -v '^$' || true; }
          # A duplicate key would let a second `damage|damage=130` line sit beside
          # the frozen `=100` (the base pair still present, so the change check
          # below misses it) while the runtime loader takes the last value —
          # silent inflation. One budget per category, always.
          dupes=$(pairs < "$LEDGER" | cut -d= -f1 | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::Duplicate category budget key(s) in $LEDGER ($(echo "$dupes" | tr '\n' ' ')) — each category has exactly one frozen power budget"
            exit 1
          fi
          # Compare the set of non-comment, whitespace-stripped category=power
          # pairs. A CHANGED value (e.g. damage|damage=100 -> =130) leaves the
          # base pair absent from head, and a removed line likewise — both are
          # caught; a genuinely new category appears only in head and is allowed.
          # A ledger absent from base (the introducing PR) is an empty base.
          pairs < "$LEDGER" | sort -u > /tmp/budget-head
          if git cat-file -e "$BASE_SHA:$LEDGER" 2>/dev/null; then
            git show "$BASE_SHA:$LEDGER" | pairs | sort -u > /tmp/budget-base
          else
            : > /tmp/budget-base
          fi
          changed=$(comm -23 /tmp/budget-base /tmp/budget-head)
          if [ -n "$changed" ]; then
            echo "::error::Category power budget(s) changed or removed in $LEDGER ($(echo "$changed" | tr '\n' ' ')) — the open-world arsenal never gains raw power (no-power-inflation law)"
            exit 1
          fi
      - name: Category cycle floors are frozen (no-throughput-inflation law)
        # The power ledger freezes how much a cast does, not how OFTEN it lands:
        # throughput is power / (cast_time_ms + cooldown_ms). Shortening the cycle
        # inflates damage per second on an unchanged frozen budget, and the
        # sidegrade guard misses it (a shorter cooldown traded against a shorter
        # range is no Pareto win). The cycle floor is the other half of the law,
        # so it gets the same permanence anchor: against the BASE commit a
        # role|effect=floor line may only ever be ADDED — never changed or removed.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          LEDGER=client/tests/data/shipped_class_cycle_floor.txt
          if [ ! -f "$LEDGER" ]; then
            echo "::error::$LEDGER was deleted — the frozen cycle-floor ledger must exist"
            exit 1
          fi
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present in the checkout — cannot verify the cycle-floor ledger"
            exit 1
          fi
          # sed strips whitespace WITHIN each line; `tr -d` would delete the
          # newlines too and collapse the whole ledger into one blob, which
          # silently disables the duplicate-key check and makes a legitimate
          # new-category ADD look like a changed line.
          # `|| true`: grep exits 1 on no-match, and under `set -o pipefail` a
          # ledger that is empty or comments-only would abort the step with no
          # diagnostic. As a pure filter, "no pairs" is a valid result.
          pairs() { grep -v '^[[:space:]]*#' | sed 's/[[:space:]]//g' | grep -v '^$' || true; }
          dupes=$(pairs < "$LEDGER" | cut -d= -f1 | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::Duplicate category floor key(s) in $LEDGER ($(echo "$dupes" | tr '\n' ' ')) — each category has exactly one frozen cycle floor"
            exit 1
          fi
          pairs < "$LEDGER" | sort -u > /tmp/floor-head
          if git cat-file -e "$BASE_SHA:$LEDGER" 2>/dev/null; then
            git show "$BASE_SHA:$LEDGER" | pairs | sort -u > /tmp/floor-base
          else
            : > /tmp/floor-base
          fi
          changed=$(comm -23 /tmp/floor-base /tmp/floor-head)
          if [ -n "$changed" ]; then
            echo "::error::Category cycle floor(s) changed or removed in $LEDGER ($(echo "$changed" | tr '\n' ' ')) — a shipped category never gains throughput (no-power-inflation law)"
            exit 1
          fi
      - name: New categories stay within the shipped scale
        # A brand-new role|effect category is the remaining way to inflate power
        # permanently: `tank|damage=1000000` with a matching ability satisfies the
        # append-only ledgers, the registry's equality check and the dominance
        # check, and — because the ledgers are immutable — that ceiling could never
        # be corrected afterwards. So a category added in this PR must sit within
        # the scale already shipped: no budget above the highest shipped budget,
        # no cycle floor below the fastest shipped floor. Widening the scale itself
        # is a deliberate balance decision, not something a PR does in passing.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          BUDGETS=client/tests/data/shipped_class_power.txt
          FLOORS=client/tests/data/shipped_class_cycle_floor.txt
          # sed strips whitespace WITHIN each line; `tr -d` would delete the
          # newlines too and collapse the whole ledger into one blob, which
          # silently disables the duplicate-key check and makes a legitimate
          # new-category ADD look like a changed line.
          # `|| true`: grep exits 1 on no-match, and under `set -o pipefail` a
          # ledger that is empty or comments-only would abort the step with no
          # diagnostic. As a pure filter, "no pairs" is a valid result.
          pairs() { grep -v '^[[:space:]]*#' | sed 's/[[:space:]]//g' | grep -v '^$' || true; }
          base_of() {
            if git cat-file -e "$BASE_SHA:$1" 2>/dev/null; then
              git show "$BASE_SHA:$1" | pairs
            fi
          }
          # The PR that INTRODUCES a ledger has an empty base and therefore no
          # established scale to measure against — that bootstrap is allowed, and
          # every later addition is bounded by it.
          base_of "$BUDGETS" > /tmp/scale-budget-base
          pairs < "$BUDGETS" > /tmp/scale-budget-head
          if [ -s /tmp/scale-budget-base ]; then
            max_budget=$(cut -d= -f2 /tmp/scale-budget-base | sort -n | tail -1)
            while IFS= read -r line; do
              key=${line%%=*}; value=${line#*=}
              if grep -q "^${key}=" /tmp/scale-budget-base; then continue; fi
              if [ "$value" -gt "$max_budget" ]; then
                echo "::error::New category [$key] claims power budget $value, above the highest shipped budget ($max_budget) — a new category may not widen the power scale"
                exit 1
              fi
            done < /tmp/scale-budget-head
          fi
          base_of "$FLOORS" > /tmp/scale-floor-base
          pairs < "$FLOORS" > /tmp/scale-floor-head
          if [ -s /tmp/scale-floor-base ]; then
            min_floor=$(cut -d= -f2 /tmp/scale-floor-base | sort -n | head -1)
            while IFS= read -r line; do
              key=${line%%=*}; value=${line#*=}
              if grep -q "^${key}=" /tmp/scale-floor-base; then continue; fi
              if [ "$value" -lt "$min_floor" ]; then
                echo "::error::New category [$key] claims cycle floor ${value}ms, below the fastest shipped floor (${min_floor}ms) — a new category may not widen the throughput scale"
                exit 1
              fi
            done < /tmp/scale-floor-head
          fi
      - name: Shipped ability identity is frozen (migration transparency)
        # shipped_abilities.txt anchors only the ID SET. But a later PR could keep
        # an ID while rewriting its JSON's weapon/role/effect/telegraph — silently
        # changing WHAT a mastered ability is (e.g. moving sword_cleave to another
        # weapon), which the product law forbids without an announced, player-
        # visible deprecation. CI is the anchor: for every ability file present at
        # the BASE commit, its identity fields must be byte-identical at head.
        # Numeric tuning (cast/cooldown/cost/range/power) stays mutable, governed
        # by the sidegrade + frozen-budget guards.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present — cannot verify ability identity"
            exit 1
          fi
          identity() { jq -S -c '{id,weapon,role,effect,telegraph}'; }
          fail=0
          for f in $(git ls-tree -r --name-only "$BASE_SHA" -- client/abilities | grep -E '\.json$'); do
            if [ ! -f "$f" ]; then
              echo "::error::shipped ability file $f was removed — a mastered ability is never taken away (no-resets law); ship a new ability or an announced deprecation"
              fail=1; continue
            fi
            base_id=$(git show "$BASE_SHA:$f" | identity)
            head_id=$(identity < "$f")
            if [ "$base_id" != "$head_id" ]; then
              echo "::error::$f changed a shipped ability's identity (id/weapon/role/effect/telegraph): $base_id -> $head_id — identity is frozen; ship a new ability or an announced deprecation"
              fail=1
            fi
          done
          [ "$fail" = 0 ]
      - name: No strict self-buff over base (partial anti-inflation guard)
        # A rebalance IS allowed, but a shipped ability may never become a STRICT
        # UPGRADE of its own base version: an improvement on one axis (lower
        # cast/cooldown/cost, higher range/power) with nothing given back is a
        # free buff, and there is no undo. Nerfs and true sidegrades pass.
        #
        # SCOPE (deliberately partial): this catches the BLATANT case only. A
        # nominal sidegrade (a token range nerf paying for a large cooldown cut)
        # passes here, and a brand-new ability is never compared at all — which is
        # why throughput is bounded absolutely by the frozen cycle floor above
        # rather than relying on this step. The multi-target economy (telegraph
        # AREA) is not in this step's model either; the widening half of it is
        # held by the cone-wedge step below, and a NEW cone's opening width
        # remains the balance decision in #82 — now SETTLED rather than pending:
        # maintainer direction 2026-07-18 (option C) keeps it a reviewed balance
        # decision, not a future CI guard, because an opening width has no
        # already-shipped anchor and picking one freezes an area-vs-magnitude
        # exchange rate permanently under the no-resets law. See AGENTS.md; do
        # not add that guard without fresh direction superseding it.
        # CI is the anchor (the in-tree test cannot see the base revision).
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present — cannot verify rebalances"
            exit 1
          fi
          fail=0
          for f in $(git ls-tree -r --name-only "$BASE_SHA" -- client/abilities | grep -E '\.json$'); do
            # Removed files are handled by the identity step above.
            [ -f "$f" ] || continue
            # true iff head Pareto-dominates base: no worse on any axis (cost axes
            # lower-better, benefit axes higher-better) and strictly better on one.
            buff=$(jq -n \
              --argjson b "$(git show "$BASE_SHA:$f")" \
              --argjson h "$(cat "$f")" '
              ($h.cast_time_ms <= $b.cast_time_ms
                and $h.cooldown_ms <= $b.cooldown_ms
                and $h.resource_cost <= $b.resource_cost
                and $h.range_m >= $b.range_m
                and $h.power >= $b.power)
              and ($h.cast_time_ms < $b.cast_time_ms
                or $h.cooldown_ms < $b.cooldown_ms
                or $h.resource_cost < $b.resource_cost
                or $h.range_m > $b.range_m
                or $h.power > $b.power)')
            if [ "$buff" = "true" ]; then
              echo "::error::$f is a STRICT BUFF of its base version — a rebalance must be a sidegrade (never more power); pay for the improvement on another axis"
              fail=1
            fi
          done
          [ "$fail" = 0 ]
      - name: Shipped cone wedge may never widen (multi-target anti-inflation)
        # A cone's wedge became authorable data in #159 (`cos_half_scaled`). None
        # of the other guards can see it: the identity step freezes the telegraph
        # KIND but not its size, the sidegrade axes do not include it, and the
        # frozen power/cycle ledgers bound magnitude and rate rather than reach.
        # So a shipped cone could be widened later — strictly more targets caught
        # per cast, at the same frozen power and cycle — with every other check
        # green.
        #
        # A LOWER scaled cosine is a WIDER wedge, so the promise is that the value
        # may never DECREASE for an ability that already shipped. Narrowing is a
        # nerf and passes; a brand-new cone is never compared, so it bootstraps
        # freely (same shape as the self-buff step above).
        #
        # SCOPE: this bounds the DIRECTION of change for cones already shipped. It
        # does NOT bound a new cone's opening width against the ones already out
        # there — that needs an area-vs-magnitude exchange rate, which has no
        # already-shipped value to anchor to and remains the balance decision in
        # #82. Monotonicity composes, so enforcing it per-PR forbids widening
        # across any sequence of PRs.
        #
        # CI is the anchor: an in-tree test reading the current checkout is
        # self-consistent and could not catch a PR that edits the ability and its
        # record together.
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::error::base commit $BASE_SHA not present — cannot verify cone wedges"
            exit 1
          fi
          fail=0
          for f in $(git ls-tree -r --name-only "$BASE_SHA" -- client/abilities | grep -E '\.json$'); do
            # Removed files are handled by the identity step above.
            [ -f "$f" ] || continue
            base_cos=$(git show "$BASE_SHA:$f" | jq -r '.cos_half_scaled // empty')
            # No threshold at base means this ability predates the field; there is
            # no prior promise to keep, so it is the introduction, not a widening.
            [ -n "$base_cos" ] || continue
            head_cos=$(jq -r '.cos_half_scaled // empty' "$f")
            if [ -z "$head_cos" ]; then
              echo "::error::$f dropped 'cos_half_scaled' — a shipped cone's wedge must stay data both tiers read, never a per-tier default"
              fail=1
              continue
            fi
            # Fail closed on a non-integer. `[ x -lt y ]` errors with "integer
            # expression expected" and returns 2 — and because that sits in an
            # `if` CONDITION, `bash -e` does NOT abort on it, so the comparison
            # would be silently skipped and this guard would quietly stop
            # guarding. The schema already refuses a fractional threshold, which
            # is precisely why the failure would go unnoticed here.
            for v in "$base_cos" "$head_cos"; do
              case "$v" in
                ''|*[!0-9-]*|-|*-*-*)
                  echo "::error::$f has a non-integer cos_half_scaled ('$v') — refusing rather than skipping the comparison"
                  fail=1; continue 2 ;;
              esac
            done
            if [ "$head_cos" -lt "$base_cos" ]; then
              echo "::error::$f WIDENED its cone: cos_half_scaled $base_cos -> $head_cos. A lower scaled cosine is a wider wedge, so this catches more targets per cast at the same frozen power and cycle. Narrowing is allowed; widening is not (see #82 for the unbounded multi-target economy)"
              fail=1
            fi
          done
          [ "$fail" = 0 ]
      - name: Install Godot (pinned, checksum-verified)
        run: |
          curl -fsSL -o godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          echo "${GODOT_SHA512}  godot.zip" | sha512sum -c -
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
      - name: Headless import + class-name scan
        # --import alone never writes global_script_class_cache.cfg, so scene-arg
        # runs (the regression tests) fail to resolve class_name types and hang.
        # The headless editor pass performs the full scan, imports, and writes it.
        # pipefail: without it, `| tee` masks a crashing godot behind tee's 0.
        run: |
          set -o pipefail
          godot --headless --editor --quit --path client 2>&1 | tee import.log
      - name: Smoke boot (120 frames)
        run: |
          set -o pipefail
          # --path is REQUIRED: the bare positional form silently boots NO
          # project (verified on 4.7.1 — project manager instead, zero res://
          # loads) and the error grep then passes vacuously. The BOOT_OK
          # marker printed by main.gd is the positive proof the world
          # actually built; pipefail keeps a crash from hiding behind tee.
          godot --headless --quit-after 120 --path client 2>&1 | tee smoke.log
          if ! grep -q "BOOT_OK" smoke.log; then
            echo "::error::Smoke boot never reached BOOT_OK — the project did not actually boot"; exit 1
          fi
          if grep -qE "SCRIPT ERROR|^ERROR" smoke.log import.log; then
            echo "::error::Errors during headless boot"; exit 1
          fi
      - name: Save-fixture guard (every historical save loads with zero loss)
        # THE product-law surface (no-resets law, issue #36): its own named
        # step so a stranded save fails loudly here, never buried in the
        # per-stage loop below.
        run: ./tools/run-client-test.sh save_fixture_guard_test "a historical save no longer loads with zero loss"
      - name: Save-vault guard (every historical vault loads with zero loss)
        # THE product-law surface for PROGRESSION state (#249, parent #3), the
        # sibling of the save-fixture guard above. Its own named step, outside
        # the auto-discovered loop, so it is loud and NOT skippable via
        # ci-skip.txt: silently dropping a player's progression must never be
        # one line of config away.
        run: ./tools/run-client-test.sh save_vault_guard_test "a historical vault no longer loads with zero loss"
      - name: Vault restore guard (an attuned point still restores on boot)
        # The BEHAVIOURAL half of the vault product law (#254 review). The
        # save-vault guard above proves shipped vaults persist and their names
        # are still recognised — it never boots the game, so it cannot see a
        # resolver branch that was removed or repointed. This one does, and it
        # must be as non-skippable as its siblings: left in the auto-discovered
        # loop it honours ci-skip.txt, so one line of config could disable the
        # only guard that checks a player actually wakes where they attuned.
        run: ./tools/run-client-test.sh vault_restore_boot_test "an attuned respawn point no longer restores on boot"
      - name: Ability law guard (sidegrade + no power/throughput inflation)
        # THE combat product-law surface (#70), and the ONLY place the sidegrade
        # and budget/cycle-floor matching actually run — the ledger steps above
        # anchor the ledgers against the base revision, but they never call
        # find_strict_dominance or match an ability to its budget. Kept in its own
        # named step, deliberately OUTSIDE the auto-discovered loop, because that
        # loop honours client/tests/ci-skip.txt: a later PR could otherwise skip
        # this scene and merge a same-class strict upgrade. Power inflation is
        # permanent, so this guard must not be skippable.
        run: ./tools/run-client-test.sh ability_registry_test "a combat product law is broken"
      - name: Regression tests
        # Auto-discover every client/tests/*_test.tscn scene, so adding a test
        # needs ZERO ci.yaml edits (issue #50 — the hardcoded list forced every
        # parallel test-adding PR to collide on this one line). Each scene is
        # judged by tools/run-client-test.sh, the same runner the product-law
        # steps above call, so the pass criterion is defined in exactly one
        # place (issue #305).
        #   - save_fixture_guard_test, save_vault_guard_test,
        #     vault_restore_boot_test and ability_registry_test are deliberately
        #     excluded: each runs in its own named step above (the product-law
        #     surfaces, kept loud, separate and NON-SKIPPABLE), so discovering
        #     them here would both run them twice and expose them to ci-skip.
        #   - A test can be temporarily excluded by adding its basename (no
        #     .tscn) on its own line in client/tests/ci-skip.txt (edited rarely;
        #     the RUN line stops changing per-test). Blank/`#`-comment lines are
        #     ignored. The file is optional — absent means nothing is skipped.
        run: |
          set -o pipefail
          shopt -s nullglob
          skip_file=client/tests/ci-skip.txt
          is_skipped() {
            [ -f "$skip_file" ] || return 1
            grep -vE '^[[:space:]]*(#|$)' "$skip_file" | grep -qxF "$1"
          }
          ran=0
          for scene in $(printf '%s\n' client/tests/*_test.tscn | sort); do
            t=$(basename "$scene" .tscn)
            # Run in their own dedicated steps above — never twice, and never
            # skippable via ci-skip.txt (they are the product-law surfaces).
            case "$t" in save_fixture_guard_test|save_vault_guard_test|vault_restore_boot_test|ability_registry_test) continue ;; esac
            if is_skipped "$t"; then
              echo "::notice::skipping ${t} (listed in ${skip_file})"
              continue
            fi
            # `|| exit 1` rather than relying on the step shell's `-e`: the rest
            # of this workflow propagates failure explicitly, and a discovered
            # test that fails must never be counted into `ran`.
            ./tools/run-client-test.sh "$t" || exit 1
            ran=$((ran + 1))
          done
          # A glob that silently matches nothing would let this step pass
          # vacuously (the same trap the smoke-boot BOOT_OK marker guards against).
          if [ "$ran" -eq 0 ]; then
            echo "::error::no regression test scenes discovered under client/tests/*_test.tscn"
            exit 1
          fi
          echo "Ran ${ran} discovered regression test scene(s)."

  client-export-macos:
    name: Client export (macOS)
    # BUILD VERIFICATION, not distribution: this proves a change still exports
    # and that the exported .app actually boots, so a broken export is caught on
    # the PR rather than at release time. The shipped, version-stamped build is
    # cd.yaml's job — the artifact uploaded here is a debugging convenience with
    # no version identity, and is never an install source.
    #
    # macOS runner on purpose: Godot's built-in AD-HOC codesign only works on a
    # macOS host, and an unsigned arm64 .app is killed by macOS before it can
    # launch — a Linux-exported unsigned zip would be dead on arrival on the
    # maintainer's Apple-Silicon machine.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # This job uploads an artifact — never let the checked-out token
          # ride along in it (zizmor artipacked).
          persist-credentials: false
      - name: Install Godot (pinned, checksum-verified)
        run: |
          curl -fsSL -o godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          echo "${GODOT_MACOS_SHA512}  godot.zip" | shasum -a 512 -c -
          unzip -q godot.zip
          printf '#!/bin/sh\nexec "%s/Godot.app/Contents/MacOS/Godot" "$@"\n' "${PWD}" | sudo tee /usr/local/bin/godot >/dev/null
          sudo chmod +x /usr/local/bin/godot
      - name: Install export templates (pinned, checksum-verified)
        run: |
          curl -fsSL -o templates.tpz "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          echo "${GODOT_TEMPLATES_SHA512}  templates.tpz" | shasum -a 512 -c -
          unzip -q templates.tpz
          mkdir -p "${HOME}/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mv templates/* "${HOME}/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable/"
      - name: Headless import + class-name scan
        # Same rule as the smoke job: only the headless editor pass writes
        # global_script_class_cache.cfg; exporting without it breaks class_name
        # resolution in the packed scripts.
        run: godot --headless --editor --quit --path client 2>&1 | tee import.log
      - name: Export .app (release, ad-hoc signed)
        run: |
          mkdir -p build
          godot --headless --export-release "macOS" "${PWD}/build/WorldAtRuin.zip" --path client 2>&1 | tee export.log
          if grep -qE "SCRIPT ERROR|^ERROR" export.log import.log; then
            echo "::error::Errors during export"; exit 1
          fi
          test -s build/WorldAtRuin.zip
      - name: Smoke boot the EXPORTED app (60 frames)
        # Boot the artifact itself, not the editor build — proves the shipped
        # .app actually starts (packed resources resolve, signature is valid).
        # pipefail: without it, tee masks a nonzero exit from the app itself
        # (a crash with no matching error line would upload a broken artifact).
        run: |
          set -o pipefail
          unzip -q build/WorldAtRuin.zip -d build/app
          "build/app/World at Ruin.app/Contents/MacOS/World at Ruin" --headless --quit-after 60 2>&1 | tee exported-smoke.log
          if grep -qE "SCRIPT ERROR|^ERROR" exported-smoke.log; then
            echo "::error::Errors booting the exported app"; exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: WorldAtRuin-macOS-universal
          path: build/WorldAtRuin.zip
          if-no-files-found: error

  license-guard:
    name: Licence guard (no GPL/AGPL in tree, provenance on every asset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Read-only job: no push, so the token must not linger in .git/config.
          persist-credentials: false
      - name: Reject GPL/AGPL-licensed content
        run: |
          # The shipped tree must stay proprietary-compatible: no GPL/AGPL
          # licence texts or SPDX identifiers may enter it (AGENTS.md,
          # Licensing). Matches licence declarations, not prose mentions.
          if grep -rniE "SPDX-License-Identifier: (A?GPL|LGPL)|GNU (Affero )?General Public License" \
              --exclude-dir=.git --exclude-dir=.github --exclude=AGENTS.md .; then
            echo "::error::GPL/AGPL-licensed content detected — forbidden in the shipped tree"; exit 1
          fi
      - name: Require a PROVENANCE.md for every asset directory
        # The other half of licensing hygiene: a permissive licence is only
        # worth anything if we can still say where the bytes came from.
        # AGENTS.md (Structure) requires a PROVENANCE.md per asset directory
        # and #16 lists provenance drift as a standing risk to enforce rather
        # than remember — this is that enforcement. It rides in this job
        # because it is the same concern and the job is already required, so
        # the check costs no extra runner.
        run: ./tools/provenance-guard.sh


  server-ci:
    name: Server CI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The job only builds and tests local Go code — it never needs the
          # checkout token, so don't persist it into .git/config (zizmor
          # artipacked).
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: server/go.mod
          # Real dependencies exist now (the Agones SDK and its gRPC stack),
          # so cache the module downloads keyed on go.sum.
          cache: true
          cache-dependency-path: server/go.sum
      - name: Format check (gofmt)
        working-directory: server
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "${unformatted}" ]; then
            echo "::error::gofmt found unformatted files:"; echo "${unformatted}"; exit 1
          fi
      - name: Vet
        working-directory: server
        run: go vet ./...
      - name: Test (race detector + tick-determinism)
        working-directory: server
        run: go test -race -count=1 ./...
      - name: Build
        working-directory: server
        run: go build ./...

  detect-visual-changes:
    name: Detect player-visible changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      visual: ${{ steps.check.outputs.visual }}
      first_run: ${{ steps.check.outputs.first_run }}
      export_affecting: ${{ steps.check.outputs.export_affecting }}
      gpu_gated: ${{ steps.check.outputs.gpu_gated }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: check
        name: Does this PR touch anything a player could see?
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            # Cannot diff — assume BOTH, so evidence is never silently skipped.
            # first_run must be set here too: leaving it empty reads as false,
            # which would quietly drop first-run evidence in precisely the case
            # where the changed paths cannot be classified at all.
            # gpu_gated belongs here for the same reason, and the omission was
            # worse than the others: an unset output reads as false, so the
            # probe-gated warning would be silently suppressed in exactly the
            # case where nothing could be classified — fail-OPEN inside a guard
            # whose whole purpose is to fail closed.
            {
              echo "visual=true"
              echo "first_run=true"
              echo "export_affecting=true"
              echo "gpu_gated=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # `tools` is in the list on purpose: a change to the capture tool
          # itself must trigger a capture, because running it IS how the tool is
          # validated. project.godot is here too: it carries the viewport size
          # and stretch mode, which decide whether the creator's fixed-height
          # panel clips — the very thing the capture's clamp note warns about.
          # The humanoid kit is here because the creator DISPLAYS it: the
          # portrait rig is built from those meshes, textures and equipment, and
          # the world capture deliberately hides the creator while its fixed
          # cameras never frame a character up close — so a change to the kit
          # would otherwise get no picture of the surface it changed. player.gd
          # likewise: the creator builds its portrait from the player's own body
          # and camera rig, so a change there can break the portrait while the
          # world vantages — which never frame the player — stay identical. And
          # scenes/main.tscn, which project.godot names as the boot scene: it can
          # change the script or children that decide the absent-save flow. Omitting it meant the PR that introduced this job skipped
          # its own job and proved nothing.
          #
          # project.godot counts too: it carries the RENDERING configuration
          # (renderer, MSAA, shadow and global-illumination quality, window
          # size), so a change to it can alter every frame while touching no
          # script or asset at all.
          # export_presets.cfg counts too: high-res flags, export filters and
          # feature tags change what the SHIPPED build looks like while touching
          # no script, scene or asset at all.
          # Materialise the changed paths ONCE and grep the file. Piping
          # `git diff` straight into `grep -q` is a real hazard under this
          # runner's `-o pipefail` shell: grep exits the moment it matches, git
          # diff takes SIGPIPE, and the pipeline reports failure — which reads
          # here as "no match" and silently turns the gate OFF on exactly the
          # large PRs most likely to need it. Same hazard the capture-log check
          # below already avoids by writing to a file.
          git diff --name-only "$BASE_SHA"...HEAD > changed.txt
          # ci.yaml is in the visual list for the same reason it is in the
          # export-affecting list below, and the reason is now sharper: since
          # #142 the capture is a REQUIRED check, and a required job that its
          # own gate skips fails OPEN. A PR editing frame-capture's runner,
          # steps or guards would otherwise never run the job it changed, and
          # the aggregate accepts the skip — so a broken capture workflow could
          # merge green. Running the capture IS how a change to it is validated
          # (the #145/#170 lesson, applied to the editor job).
          if grep -qE '^client/(scripts|shaders|assets|scenes|recipes|abilities|tools)/|^client/(project\.godot|export_presets\.cfg)$|^\.github/workflows/ci\.yaml$' changed.txt; then
            echo "visual=true" >> "$GITHUB_OUTPUT"
          else
            echo "visual=false" >> "$GITHUB_OUTPUT"
          fi
          # First-run UI is judged separately, because the ordinary capture
          # SEEDS A SAVE so the creator is not in shot — which means a PR
          # changing the creator gets frames of everything except the surface it
          # changed, and passes. This narrower set decides whether the extra
          # first-run pass is worth its minute; keeping it narrow is what stops
          # the default player-visible PR paying for it (#145).
          #
          # main.gd is in the list because it decides WHEN the creator opens,
          # character_store.gd because main.gd asks IT whether a save exists (a
          # save-routing regression could make new players skip the creator
          # entirely), and tools/ because running the capture tool is how it is
          # validated. project.godot is here too: it carries the viewport size
          # and stretch mode, which decide whether the creator's fixed-height
          # panel clips — the very thing the capture's clamp note warns about.
          # The humanoid kit is here because the creator DISPLAYS it: the
          # portrait rig is built from those meshes, textures and equipment, and
          # the world capture deliberately hides the creator while its fixed
          # cameras never frame a character up close — so a change to the kit
          # would otherwise get no picture of the surface it changed.
          # ci.yaml is here for the same self-validation reason it is in the
          # visual and export-affecting lists — but note the gap it closes is a
          # STEP, not a job. The first-run pass is a step inside frame-capture
          # gated on this output, so making the JOB run on a ci.yaml change is
          # not enough: without this, a PR editing the first-run step's own
          # commands or guards runs the capture and skips the step it changed.
          # That is not hypothetical — a stale assertion in this step is exactly
          # how the capture broke on `cc45ac5b` (see #142).
          if grep -qE '^client/scripts/(character_creator|character_factory|character_store|main|player)\.gd$|^client/scenes/main\.tscn$|^client/(recipes|tools)/|^client/assets/characters/humanoid_kit/|^client/project\.godot$|^\.github/workflows/ci\.yaml$' changed.txt; then
            echo "first_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "first_run=false" >> "$GITHUB_OUTPUT"
          fi
          # Export-affecting paths get a THIRD, narrower gate: the ordinary
          # capture photographs the editor project, but a change to
          # export_presets.cfg (resource filters, feature tags, high-res flags)
          # or project.godot (packed-resource resolution interacts with the
          # rendering config) can change what the SHIPPED build looks like while
          # the editor run stays identical — so those paths also get frames from
          # the exported client (#174). The workflow file itself is in the list
          # for the same reason tools/ is in the visual list: running the
          # exported capture IS how a change to that job is validated, and the
          # PR that introduces the job must not skip it (the #145/#170 lesson).
          # main.gd and tools/ are in the list because they IMPLEMENT the
          # exported entry: main.gd carries the WAR_CAPTURE boot redirect and
          # tools/ is the capture harness itself, and an editor-compatible
          # change to either (an env-var rename, a current_scene change, a
          # harness edit that only the packed runtime resolves differently)
          # would break the exported path while the editor capture — which
          # enters via the scene argument and never takes the redirect —
          # stayed green.
          if grep -qE '^client/(project\.godot|export_presets\.cfg)$|^client/scripts/main\.gd$|^client/tools/|^\.github/workflows/ci\.yaml$' changed.txt; then
            echo "export_affecting=true" >> "$GITHUB_OUTPUT"
          else
            echo "export_affecting=false" >> "$GITHUB_OUTPUT"
          fi
          # A FOURTH gate, for the class of change CI structurally cannot
          # photograph (#232). Volumetric fog is gated on an R32_Uint atomic
          # storage image, and the hosted macOS runner's virtualised Apple
          # adapter does not support it — so every frame in every artifact
          # depicts the height-fog FALLBACK. A change to the volumetric path
          # therefore gets a green required capture over frames that cannot
          # contain it, which is exactly the "green check over an unphotographable
          # change" the evidence gate exists to prevent.
          #
          # This flag does not block. It marks the PR so the capture job can say
          # so plainly in the artifact and the summary, turning a silent
          # degradation into a stated one that a reviewer can act on.
          # main.gd is in the list because it OWNS the wiring, not just a call:
          # _build_environment() runs the probe and applies the verdict, and
          # _build_hollow_fog() decides whether the probe-gated FogVolume nodes
          # are built at all. A change touching only main.gd can therefore alter
          # the enabled path exclusively — the one the capture cannot show. It
          # is deliberately conservative: this flag only ever adds a warning, so
          # a false positive costs a line of log and a false negative costs the
          # silent green this whole change exists to stop.
          if grep -qE '^client/scripts/(volumetrics|hollow_fog|main)\.gd$|^\.github/workflows/ci\.yaml$' changed.txt; then
            echo "gpu_gated=true" >> "$GITHUB_OUTPUT"
          else
            echo "gpu_gated=false" >> "$GITHUB_OUTPUT"
          fi

  frame-capture:
    name: Frame capture (evidence)
    # The quality bar judges player-visible work on the rendered frame, so CI
    # produces frames a reviewer can open instead of trusting a written claim.
    #
    # macOS runner on purpose: rendering needs a real GPU surface — a headless
    # Linux run renders NOTHING (the capture tool refuses to run headless rather
    # than emit a blank frame).
    #
    # REQUIRED as of #142: the hosted macOS runner has demonstrably given the
    # windowed Godot process a usable Metal surface — 18 consecutive successful
    # runs, and 77 of 79 overall, with both failures deterministic and diagnosed
    # (neither was runner flake). The reliability record is on #142.
    #
    # This job is path-gated, so it is SKIPPED on PRs that touch nothing a player
    # can see. That is safe here only because aggregate-job-checks treats a
    # skipped result as acceptable — verify that before adding any other
    # conditional job to the required set, or every unrelated PR blocks.
    needs: [detect-visual-changes]
    if: needs.detect-visual-changes.outputs.visual == 'true'
    runs-on: macos-latest
    # Bounded because the aggregate now WAITS for this job. A GDScript compile
    # error makes a Godot scene hang instead of reaching quit() (a failure mode
    # this repo has hit), and without a timeout the default 360 minutes would
    # leave `CI - Required Checks` pending for six hours rather than failing.
    # Same bound as the exported capture, which already carries one.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the change report at the end of this job renders the
          # MERGE BASE from a git worktree of this same clone, which a depth-1
          # checkout cannot reach. The ledger jobs already take it for the same
          # kind of reason.
          fetch-depth: 0
          # This job uploads an artifact — never let the checked-out token ride
          # along in it (zizmor artipacked).
          persist-credentials: false
      - name: Install Godot (pinned, checksum-verified)
        run: |
          curl -fsSL -o godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          echo "${GODOT_MACOS_SHA512}  godot.zip" | shasum -a 512 -c -
          unzip -q godot.zip
          printf '#!/bin/sh\nexec "%s/Godot.app/Contents/MacOS/Godot" "$@"\n' "${PWD}" | sudo tee /usr/local/bin/godot >/dev/null
          sudo chmod +x /usr/local/bin/godot
      - name: Headless import + class-name scan
        # Only the headless editor pass writes global_script_class_cache.cfg;
        # without it a scene-arg run cannot resolve class_name types and HANGS.
        run: godot --headless --editor --quit --path client 2>&1 | tee import.log
      - name: Capture frames
        # A seeded save is required: with none present the first-run character
        # creator opens and its panel covers a third of every frame.
        run: |
          set -o pipefail
          mkdir -p "${RUNNER_TEMP}/shots"
          # Seed a save so the first-run creator does not cover a third of every
          # frame. Checked explicitly rather than trusting the shell's errexit:
          # if this preset is ever renamed, a silent miss here would produce
          # frames of the character creator that still passed every guard.
          if ! cp client/recipes/wanderer.json "${RUNNER_TEMP}/probe_save.json"; then
            echo "::error::could not seed the capture save from client/recipes/wanderer.json — frames would show the first-run creator instead of the world"
            exit 1
          fi
          # No --resolution override: the gate treats client/project.godot as a
          # visual trigger precisely BECAUSE it carries the shipped window size,
          # so forcing a size here would hide the very change being reviewed.
          # The runner clamps the window to what its display allows regardless.
          WAR_SHOT_DIR="${RUNNER_TEMP}/shots" \
          WAR_SAVE_PATH="${RUNNER_TEMP}/probe_save.json" \
            godot --path client res://tools/frame_capture.tscn 2>&1 | tee capture.log
          if ! grep -q "CAPTURE PASS" capture.log; then
            echo "::error::frame capture did not report PASS — see log"; tail -40 capture.log; exit 1
          fi
          # The project's own positive boot marker must also be present. The
          # capture tool asserts the world exists and is visible, but a path
          # that returns early AFTER the terrain is built and BEFORE main.gd
          # finishes booting would still satisfy that — and the frames would
          # depict a half-initialised game.
          if ! grep -q "BOOT_OK" capture.log; then
            echo "::error::capture never reached BOOT_OK — frames depict a partially booted game"
            tail -40 capture.log; exit 1
          fi
          # A runtime failure AFTER the world builds can still leave a
          # renderable scene, so PASS alone is not proof the frames depict a
          # healthy game. Treat script errors during capture as a failure.
          #
          # EXCEPT the Metal driver's `timeout waiting for fence`: the runner's
          # GPU is a virtualised Apple Paravirtual adapter that intermittently
          # misses a fence during warm-up and then RECOVERS. It is a driver
          # retry, not a render fault — proven by the frames that follow it
          # being byte-for-byte identical to runs without it (same luma spreads
          # to three decimals). Failing on it rejected three healthy captures.
          # Filter to a FILE rather than piping into `grep -q`. Under pipefail a
          # `grep -v … | grep -q …` test can report the pipeline as failed when
          # the downstream grep exits early on a match and the upstream takes
          # SIGPIPE — which would read as "no errors found" and let a genuine
          # SCRIPT ERROR through. (Not reproducible on this macOS runner even
          # over a 1.7 MB log, but the file form removes the hazard class
          # entirely and costs nothing.)
          grep -vE "timeout waiting for fence|drivers/metal/rendering_device_driver_metal" \
            capture.log > capture.filtered.log || true
          if grep -qE "SCRIPT ERROR|^ERROR" capture.filtered.log; then
            echo "::error::errors during capture — frames may not depict a healthy world"
            grep -nE "SCRIPT ERROR|^ERROR" capture.filtered.log | head -20
            exit 1
          fi
      - name: Record what these frames can evidence
        # #232. Volumetric fog is gated on an R32_Uint atomic storage image and
        # this runner's virtualised Apple adapter does not support it, so every
        # frame published here depicts the height-fog FALLBACK. That was true
        # before this step existed — the difference is that it was only ever
        # stated in a CI log nobody downloads, so the artifact was silent about
        # which path it showed and a green required check read as evidence for
        # a change it structurally could not contain.
        #
        # This step does not change what is captured. It makes the capture
        # CONDITIONS travel with the frames, and fails when they are unknown.
        env:
          GPU_GATED: ${{ needs.detect-visual-changes.outputs.gpu_gated }}
        run: |
          set -o pipefail
          # FAIL CLOSED on an unknown verdict. main.gd prints this line through
          # Volumetrics.marker() and volumetrics_test pins its shape, so a drift
          # that breaks this parse fails the unit test first — but if the print
          # is removed outright, the degradation would become UNKNOWABLE rather
          # than merely invisible, and a green capture would go straight back to
          # reading as volumetric evidence. Unknown is a failure, not a default.
          # Read each gated feature's verdict, and fail closed on ANYTHING
          # ambiguous. `head -1` on a multi-verdict log is not a tiebreak, it is
          # a coin toss that silently suppresses the warning — so require
          # exactly one DISTINCT verdict per marker rather than taking the
          # first. (A boundary alone stops "VOLUMETRICS onward …" from matching;
          # it does not stop two genuine contradictory markers.)
          read_verdict() {
            marker="$1"; log="$2"
            distinct="$(grep -oE "^${marker} (on|off)([[:space:]]|\$)" "$log" \
              | sed -E "s/^${marker} //; s/[[:space:]]*\$//" | sort -u)"
            # `|| true`: grep -c exits 1 on a zero count, and under `bash -e` a
            # failing command substitution in an assignment kills the step —
            # which would bypass the explicit no-verdict error below.
            n="$(printf '%s\n' "$distinct" | grep -c . || true)"
            if [ "$n" -eq 0 ]; then
              echo "::error::no ${marker} verdict in ${log} — cannot tell what these frames depict (see the marker() helper and its pinning test)" >&2
              return 1
            fi
            if [ "$n" -gt 1 ]; then
              echo "::error::contradictory ${marker} verdicts in ${log} ($(printf '%s' "$distinct" | tr '\n' '/')) — refusing to guess which one the frames depict" >&2
              return 1
            fi
            printf '%s' "$distinct"
          }
          probe="$(read_verdict VOLUMETRICS capture.log)" || exit 1
          pools="$(read_verdict 'HOLLOW FOG' capture.log)" || exit 1
          echo "volumetric fog path: ${probe}; hollow ash pools: ${pools}"

          # Travels INSIDE the artifact, beside the PNGs, so a reviewer who
          # downloads frames a week later still knows what they are looking at.
          {
            echo "# Capture conditions"
            echo
            echo "runner: ${RUNNER_OS} (hosted)"
            echo "volumetric_fog: ${probe}"
            echo "hollow_ash_pools: ${pools}"
            if [ "${probe}" = "off" ]; then
              echo
              echo "These frames show the HEIGHT-FOG FALLBACK, not the volumetric"
              echo "path: this runner's GPU lacks R32_Uint atomic storage image"
              echo "support, so Godot's froxel volumetrics never initialise here."
              echo "Nothing in this artifact evidences a change to volumetric fog."
            fi
            if [ "${pools}" = "off" ]; then
              echo
              echo "This world contains ZERO ash pools. #233 retired the opt-in"
              echo "that used to gate them, so pools now build wherever the GPU"
              echo "probe passes — meaning this verdict normally follows the"
              echo "volumetric one above, and an 'off' here with the probe ON"
              echo "would instead mean no hollow was deep enough to qualify."
              echo "Nothing in this artifact evidences a change to the pools."
            fi
          } > "${RUNNER_TEMP}/shots/capture-conditions.txt"

          {
            echo "### Frame capture conditions"
            echo
            echo "Volumetric fog path: **${probe}** · hollow ash pools: **${pools}**"
          } >> "$GITHUB_STEP_SUMMARY"

          # The case #232 is actually about: a PR changing probe-gated code,
          # captured on a runner that cannot run it. Say so loudly rather than
          # letting the green check imply coverage. Not a hard failure — the
          # frames are still valid evidence for everything else in the diff, and
          # blocking here would block the whole volumetric lane on a runner
          # limitation. The obligation it raises is the one AGENTS.md already
          # makes a P1 review blocker: attach a frame of the actual change.
          # Keyed on what was ACTUALLY RENDERED, not on the GPU verdict alone.
          # Pools need the probe AND the opt-in, so keying this on `probe` would
          # go quiet — and imply the frames show the pools — the moment a
          # capable runner arrives (the lavapipe lane, #314) while the capture
          # still sets no opt-in. The condition has to track every gate that can
          # empty the frame, or it decays into a claim the frames do not support.
          # `if` blocks, NOT `[ … ] && var=…`: this step runs under `bash -e`,
          # where a bare test-and-assign whose test is FALSE makes the list
          # return non-zero and kills the step. The failure would land only on
          # runs where the feature rendered correctly — the green path — so it
          # would look like a flake in the capture rather than a shell bug.
          # Each item carries its own "no", so the joined phrase reads correctly
          # for one item AND for both: "no volumetric fog and no hollow ash
          # pools", never "no volumetric fog and hollow ash pools" — which
          # scans as though the pools WERE rendered.
          missing=""
          if [ "${probe}" = "off" ]; then
            missing="no volumetric fog"
          fi
          if [ "${pools}" = "off" ]; then
            missing="${missing:+${missing} and }no hollow ash pools"
          fi
          if [ "${GPU_GATED}" = "true" ] && [ -n "${missing}" ]; then
            echo "::warning::this PR touches gated rendering, but the capture rendered ${missing} — these frames CANNOT evidence that change. Attach a locally-rendered frame of the enabled path (AGENTS.md: a player-visible PR with no inspectable frame evidence is a P1 blocker)."
            {
              echo
              echo "> [!WARNING]"
              echo "> This PR touches gated rendering, but the captured frames"
              echo "> contain ${missing}. They cannot evidence that change."
              echo "> Attach a locally-rendered frame of the enabled path."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Capture the opted-in ground plates
        # The plate treatment (#261) ships default-off behind WAR_GROUND_PLATES,
        # so the ordinary capture above photographs the FALLBACK surface — the
        # artifact would show everything except the change under review. The
        # quality bar wants a frame of the actual player-visible change, so
        # capture the opted-in state too.
        #
        # Into a SUBDIRECTORY on purpose: frame_diff enumerates with
        # DirAccess.get_files(), which ignores directories, so these frames
        # cannot be mistaken for the default surface by the base comparison —
        # they are evidence to look at, not a regression baseline.
        #
        # Retire this step together with the flag, when the treatment flips
        # default-on.
        run: |
          set -o pipefail
          mkdir -p "${RUNNER_TEMP}/shots/opt-in-plates"
          WAR_SHOT_DIR="${RUNNER_TEMP}/shots/opt-in-plates" \
          WAR_SAVE_PATH="${RUNNER_TEMP}/probe_save.json" \
          WAR_GROUND_PLATES=1 \
            godot --path client res://tools/frame_capture.tscn 2>&1 | tee capture-plates.log
          if ! grep -q "CAPTURE PASS" capture-plates.log; then
            echo "::error::opted-in plate capture did not report PASS — the evidence for #261 would be missing"
            tail -40 capture-plates.log; exit 1
          fi
          if ! grep -q "BOOT_OK" capture-plates.log; then
            echo "::error::opted-in plate capture never reached BOOT_OK"
            tail -40 capture-plates.log; exit 1
          fi
          # Same error rejection as the default capture above: an error that
          # only occurs on the opted-in path can still leave a renderable scene
          # that prints PASS and BOOT_OK, so publishing a degraded plate frame
          # and reporting success is exactly the failure this evidence exists
          # to prevent. Same Metal fence carve-out and same file form (not a
          # pipe) for the reasons given there.
          grep -vE "timeout waiting for fence|drivers/metal/rendering_device_driver_metal" \
            capture-plates.log > capture-plates.filtered.log || true
          if grep -qE "SCRIPT ERROR|^ERROR" capture-plates.filtered.log; then
            echo "::error::errors during the opted-in plate capture — its frames may not depict a healthy world"
            grep -nE "SCRIPT ERROR|^ERROR" capture-plates.filtered.log | head -20
            exit 1
          fi

      - name: Capture the first-run UI
        # Only when the PR touches it. The ordinary capture deliberately seeds a
        # save so the creator is NOT in frame, so without this a creator change
        # ships with evidence that does not depict it (#145).
        if: needs.detect-visual-changes.outputs.first_run == 'true'
        run: |
          set -o pipefail
          # The save must be ABSENT here — its absence is precisely what makes
          # the creator open. Point at a path inside the run's temp dir that was
          # never created; the tool fails closed if the creator does not appear,
          # so a stray save cannot silently turn this back into a world shot.
          WAR_SHOT_DIR="${RUNNER_TEMP}/shots" \
          WAR_SCENARIO=first_run \
          WAR_SAVE_PATH="${RUNNER_TEMP}/no_such_save.json" \
            godot --path client res://tools/frame_capture.tscn 2>&1 | tee first-run.log
          # Require the FIRST-RUN marker, not a bare PASS: the world scenario
          # prints "CAPTURE PASS" too, so a regression that silently dropped
          # back to the default path would satisfy a plain PASS grep — and the
          # `Frames actually exist` check downstream is already satisfied by the
          # world PNGs sitting in the same directory. Since tools/ changes are
          # gated in here precisely so the tool validates itself, that hole
          # would let the tool stop working and still go green.
          if ! grep -qE "[0-9]+ first-run vantages? written" first-run.log; then
            echo "::error::first-run capture did not report a first-run vantage — see log"; tail -40 first-run.log; exit 1
          fi
          # Require the FULL expected set, not merely a plausible count. A
          # capture-tool change that dropped the lower-panel shot or the preset
          # loop would still report some number and still write first_run.png —
          # and since tools/ is gated in here precisely so tool changes validate
          # themselves, accepting any count would let the tool quietly stop
          # photographing most of what the gate fires on.
          #
          # The preset list is read from the creator itself rather than repeated
          # here, so adding a preset cannot leave CI silently checking the old
          # set. Fail loudly if it cannot be parsed: an empty list would turn
          # this whole check into a no-op.
          presets=$(grep -oE 'const PRESETS := \[[^]]*\]' client/scripts/character_creator.gd \
            | grep -oE '"[a-z_]+"' | tr -d '"')
          if [ -z "$presets" ]; then
            echo "::error::could not read PRESETS from client/scripts/character_creator.gd — cannot tell which frames to require"
            exit 1
          fi
          expected="first_run first_run_lower"
          for p in $presets; do expected="$expected first_run_$p"; done
          missing=""
          for f in $expected; do
            [ -s "${RUNNER_TEMP}/shots/$f.png" ] || missing="$missing $f.png"
          done
          if [ -n "$missing" ]; then
            echo "::error::first-run frames missing:$missing"
            ls -la "${RUNNER_TEMP}/shots" || true
            exit 1
          fi
          echo "first-run frames present:$expected"
          # Same reasoning as the seeded capture: the tool proves the creator is
          # up, but a path returning early before main.gd finishes booting would
          # still satisfy that, and the frame would depict a half-started game.
          # This run exercises the ABSENT-save branch, which the seeded capture
          # never touches, so it needs its own boot proof.
          if ! grep -q "BOOT_OK" first-run.log; then
            echo "::error::first-run capture never reached BOOT_OK — the frame depicts a partially booted game"
            tail -40 first-run.log; exit 1
          fi
          grep -vE "timeout waiting for fence|drivers/metal/rendering_device_driver_metal" \
            first-run.log > first-run.filtered.log || true
          if grep -qE "SCRIPT ERROR|^ERROR" first-run.filtered.log; then
            echo "::error::errors during the first-run capture"
            grep -nE "SCRIPT ERROR|^ERROR" first-run.filtered.log | head -20
            exit 1
          fi
      - name: Capture the breathing idle
        # A STILL CANNOT SHOW AN IDLE (#243). Every other capture here
        # photographs one instant, which is the right evidence for a material
        # and worthless for motion — a reviewer cannot tell a breathing body
        # from a frozen one in a single frame. This walks one character through
        # fixed phases of the breath so the SEQUENCE is the evidence, and the
        # tool fails when opposite phases come out identical.
        #
        # Run on every visual PR rather than behind its own gate: the
        # frames-must-differ guard is also the regression test for the idle
        # itself, so an animation that silently stops reddens a build instead
        # of waiting for someone to notice a village of statues.
        if: needs.detect-visual-changes.outputs.visual == 'true'
        run: |
          set -o pipefail
          # Seed a save, exactly as the world capture does — with NO save the
          # first-run creator opens and its panel covers a third of the frame.
          # This was not a hypothetical: the first version of this step merely
          # pointed WAR_SAVE_PATH at a path it never created, and the captured
          # evidence came back with the creator over the subject while every
          # check still passed.
          if ! cp client/recipes/wanderer.json "${RUNNER_TEMP}/breath_save.json"; then
            echo "::error::could not seed the breath-capture save from client/recipes/wanderer.json — frames would show the first-run creator over the subject"
            exit 1
          fi
          WAR_SHOT_DIR="${RUNNER_TEMP}/shots" \
          WAR_SCENARIO=breath \
          WAR_SAVE_PATH="${RUNNER_TEMP}/breath_save.json" \
            godot --path client res://tools/frame_capture.tscn 2>&1 | tee breath.log
          # Require the BREATH marker, not a bare PASS: the world scenario
          # prints "CAPTURE PASS" too, so a regression that silently fell back
          # to the default path would satisfy a plain grep while the world PNGs
          # already in this directory satisfied the downstream frames-exist
          # check.
          if ! grep -qE "[0-9]+ breath phases written" breath.log; then
            echo "::error::breath capture did not report a phase sequence — see log"; tail -40 breath.log; exit 1
          fi
          # A broken shader still prints CAPTURE PASS and still writes files
          # (#231), so compilation failures are checked separately from the
          # tool's own verdict.
          if grep -qE "SHADER ERROR|Shader compilation failed" breath.log; then
            echo "::error::shader compilation failed during the breath capture — the frames show a fallback material"
            grep -nE "SHADER ERROR|Shader compilation failed" breath.log | head -20
            exit 1
          fi
      - name: Frames actually exist
        # The tool fails closed on a uniform frame, but never trust a single
        # signal: confirm real files landed before advertising an artifact.
        run: |
          count=$(find "${RUNNER_TEMP}/shots" -name '*.png' -size +10k | wc -l | tr -d ' ')
          if [ "$count" -lt 1 ]; then
            echo "::error::no non-trivial PNGs produced"; ls -la "${RUNNER_TEMP}/shots" || true; exit 1
          fi
          echo "captured $count frame(s)"
      - name: Render the merge base for comparison
        # #231: every guard above answers "did something render?" — none of them
        # answers "is the change under review present?". The spread check is a
        # min/max over a 16x12 grid, so a localized effect that lands between
        # those 192 points is worth nothing to it. Measured on three captures
        # off one checkout (fog off / off / ON): sunward read a spread of 0.541
        # for ALL THREE, while a per-pixel comparison against the base moved
        # 0.01% and 21.01%. The only way to report the CHANGE is to render what
        # the change was made against.
        #
        # A git worktree of this clone, not a second checkout: the history is
        # already here from fetch-depth: 0, so this costs no network and cannot
        # drift from what the diff step is comparing.
        #
        # 🔑 base.sha, NOT the merge base — and the reason is the head side, not
        # the base side. For a pull_request event actions/checkout checks out
        # GitHub's synthetic MERGE RESULT (base tip + this PR), so the frames
        # captured above are "base tip plus my change". The commit that pairs
        # with that is therefore the base tip itself: merge-result minus
        # base.sha is exactly this PR. Rendering the older branch-point merge
        # base instead would put every sibling PR merged since the fork on the
        # wrong side of the subtraction and report their work as this PR's.
        #
        # (An earlier revision here used the merge base for exactly the opposite
        # reason and was wrong. It went unnoticed because main did not move
        # during the run that measured it, which makes the two identical —
        # the failure only appears on a PR whose base advanced.)
        #
        # continue-on-error: this is a REPORT, and a required check must not go
        # red because an old base fails to render. Its honesty is held up
        # elsewhere: frame_diff's own arithmetic is pinned by
        # tests/frame_diff_test.gd in the gated suite, and the diff step below
        # shouts a ::warning:: rather than passing quietly when it compares
        # nothing.
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          FIRST_RUN: ${{ needs.detect-visual-changes.outputs.first_run }}
        run: |
          set -o pipefail
          base="$BASE_SHA"
          echo "base (pairs with the checked-out merge result): $base"
          git worktree add --detach "${RUNNER_TEMP}/base" "$base"
          godot --headless --editor --quit --path "${RUNNER_TEMP}/base/client" 2>&1 | tail -5
          mkdir -p "${RUNNER_TEMP}/shots-base"
          # Seed from the BASE's own recipe, not the head's: a PR that edits the
          # recipe would otherwise render the base world wearing the head's
          # character, and every frame would differ for that reason alone.
          if ! cp "${RUNNER_TEMP}/base/client/recipes/wanderer.json" "${RUNNER_TEMP}/probe_save_base.json"; then
            echo "::warning::could not seed the base capture's save — skipping the change report"
            exit 1
          fi
          WAR_SHOT_DIR="${RUNNER_TEMP}/shots-base" \
          WAR_SAVE_PATH="${RUNNER_TEMP}/probe_save_base.json" \
            godot --path "${RUNNER_TEMP}/base/client" res://tools/frame_capture.tscn 2>&1 | tee base-capture.log
          if ! grep -q "CAPTURE PASS" base-capture.log; then
            echo "::warning::the merge base did not render cleanly — the change report will be incomplete"
            tail -20 base-capture.log
            exit 1
          fi
          # The head captures the first-run UI into the SAME shots dir when the
          # PR touches the creator, so without a matching base render every
          # first_run*.png is reported "no base frame" — and a character-creator
          # PR would get a change report covering only the world vantages it did
          # NOT touch, while the UI it actually changed carries no measurement.
          # That is the #145 shape all over again, one level up.
          #
          # The save must be ABSENT for the creator to open, exactly as the head
          # step does it; point at a path that was never created.
          #
          # A warning rather than exit 1: the world frames above already compared
          # successfully, and discarding their measurement because the base's
          # creator failed to render would throw away the evidence we have.
          if [ "$FIRST_RUN" = "true" ]; then
            WAR_SHOT_DIR="${RUNNER_TEMP}/shots-base" \
            WAR_SCENARIO=first_run \
            WAR_SAVE_PATH="${RUNNER_TEMP}/no_such_save_base.json" \
              godot --path "${RUNNER_TEMP}/base/client" res://tools/frame_capture.tscn 2>&1 \
              | tee base-first-run.log || true
            # The world scenario prints "CAPTURE PASS" too, so require the
            # first-run marker: a base that silently fell back to the world path
            # would leave first_run frames unmatched while looking like a success.
            if ! grep -qE "[0-9]+ first-run vantages? written" base-first-run.log; then
              echo "::warning::the base did not render the first-run UI — creator frames will carry no change measurement"
              tail -20 base-first-run.log || true
            fi
          fi
      - name: Report what changed against the base
        # Reporting only — no threshold, by #231's own acceptance criteria. A
        # docs or server-only PR that reaches here legitimately changes nothing
        # visible, and picking a pass/fail band needs a measured per-vantage
        # distribution first (the cave's animated torches already move 9% of
        # that frame between two runs of the SAME build, which is more than a
        # real change moves at the shrine).
        #
        # The numbers land in the job log AND in each frame's .txt note, so a
        # reviewer opening the artifact sees them without the log beside them.
        continue-on-error: true
        run: |
          set -o pipefail
          if [ ! -d "${RUNNER_TEMP}/shots-base" ]; then
            echo "::warning::no base frames — the merge base did not render, so this PR's frames carry no change measurement"
            exit 0
          fi
          # `|| true` is load-bearing, not sloppiness. The tool EXITS NONZERO
          # when it can compare nothing, and this shell runs with -e and
          # pipefail — so without it the step dies at the pipeline and the
          # warning below, which is the entire point of that exit code, never
          # runs. continue-on-error would keep the job green but leave only a
          # failed step and no annotation saying the artifact has no comparison.
          WAR_DIFF_BASE="${RUNNER_TEMP}/shots-base" \
          WAR_DIFF_HEAD="${RUNNER_TEMP}/shots" \
            godot --headless --path client res://tools/frame_diff.tscn 2>&1 | tee diff.log || true
          # The tool fails closed when it compares nothing. Surface that as a
          # warning rather than swallowing it: a silent empty report is the
          # exact self-attestation #231 was filed about.
          if ! grep -q "DIFF PASS" diff.log; then
            echo "::warning::the change report did not complete — this PR's frames carry no comparison against the base"
          fi
          # A vantage the base captured and the head did not is a REMOVED
          # vantage. The tool names each one; surface it as an annotation too,
          # since client/tools/ changes trigger this job precisely so a capture
          # regression cannot pass quietly.
          if grep -q "REMOVED:" diff.log; then
            echo "::warning::a committed vantage present in the base is missing from this PR's capture — see the REMOVED lines"
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frames-${{ github.event.pull_request.head.sha }}
          # .txt too: each frame's note travels with it, so a reviewer opening
          # a clamped capture can see it was the runner's display and not the
          # change under review that clipped the layout.
          path: |
            ${{ runner.temp }}/shots/*.png
            ${{ runner.temp }}/shots/*.txt
            ${{ runner.temp }}/shots/opt-in-plates/*.png
            ${{ runner.temp }}/shots/opt-in-plates/*.txt
          if-no-files-found: error

  frame-capture-exported:
    name: Frame capture (exported client)
    # The ordinary frame-capture job photographs the EDITOR project, but what a
    # player installs is the separately exported .app — a change to export-only
    # behaviour (resource filters, feature tags, packed-resource resolution,
    # high-res flags) can pass the editor capture on settings the shipped build
    # never uses. The export job already proves the shipped build STARTS; this
    # one proves it still LOOKS RIGHT (#174).
    #
    # It REUSES the artifact client-export-macos already built — exporting is
    # the multi-minute half, so a second export would double the slowest job in
    # CI for a narrow class of regression (#145's cost constraint). And it runs
    # only when export-affecting paths changed, so the default player-visible
    # PR pays nothing for it.
    #
    # The exported binary CANNOT take the positional scene argument the editor
    # run uses: the official export template is compiled with
    # disable_path_overrides and aborts on any scene path (settled empirically
    # against the 4.7.1 template before this job landed). Entry is therefore
    # WAR_CAPTURE=1, which main.gd answers by redirecting its own boot into
    # the capture scene — shipped in the pck, since export_filter is
    # "all_resources". The timeout exists because a windowed game that reaches
    # its normal boot instead of the capture tool has no quit path, and a hang
    # class this job cannot fully rule out must cost minutes, not the runner's
    # 6-hour default.
    #
    # macOS runner + windowed run for the same reason as frame-capture: the
    # capture tool refuses a headless run rather than photograph nothing.
    #
    # REQUIRED since #214, on its own measured window rather than by borrowing
    # frame-capture's: 13 consecutive successes, the single failure before them
    # root-caused as a real defect this job caught (the export template refuses
    # a positional scene path, fixed inside #210 by the WAR_CAPTURE=1 entry) —
    # not a flake. That is the same trigger #142 used, measured independently
    # because this job runs a different entry path and a different scene.
    needs: [detect-visual-changes, client-export-macos]
    if: needs.detect-visual-changes.outputs.export_affecting == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # The checkout exists only to seed the capture save from
        # client/recipes/wanderer.json — the game itself comes exclusively from
        # the export artifact.
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: WorldAtRuin-macOS-universal
          path: build
      - name: Capture frames from the exported client
        run: |
          set -o pipefail
          mkdir -p "${RUNNER_TEMP}/exported-shots"
          unzip -q build/WorldAtRuin.zip -d build/app
          # Seed a save for the same reason the editor capture does: with none
          # present the first-run creator opens and its panel covers a third of
          # every frame. Checked explicitly rather than trusting errexit: a
          # silent miss would produce frames of the character creator that
          # still passed every downstream guard.
          if ! cp client/recipes/wanderer.json "${RUNNER_TEMP}/probe_save.json"; then
            echo "::error::could not seed the capture save from client/recipes/wanderer.json — frames would show the first-run creator instead of the world"
            exit 1
          fi
          WAR_CAPTURE=1 \
          WAR_SHOT_DIR="${RUNNER_TEMP}/exported-shots" \
          WAR_SAVE_PATH="${RUNNER_TEMP}/probe_save.json" \
            "build/app/World at Ruin.app/Contents/MacOS/World at Ruin" 2>&1 | tee exported-capture.log
          if ! grep -q "CAPTURE PASS" exported-capture.log; then
            echo "::error::exported-client capture did not report PASS — see log"; tail -40 exported-capture.log; exit 1
          fi
          # Same boot proof as the editor capture: PASS asserts the world
          # exists and is visible, but a path that returns early AFTER the
          # terrain is built and BEFORE main.gd finishes booting would still
          # satisfy it — and the frames would depict a half-initialised game.
          if ! grep -q "BOOT_OK" exported-capture.log; then
            echo "::error::exported-client capture never reached BOOT_OK — frames depict a partially booted game"
            tail -40 exported-capture.log; exit 1
          fi
          # Same error scan as the editor capture, with the same Metal fence
          # carve-out (a virtualised-GPU driver retry that recovers, not a
          # render fault) and the same filter-to-a-FILE form: under pipefail a
          # `grep -v … | grep -q` pipeline can misreport a SIGPIPE'd upstream
          # as "no errors found".
          grep -vE "timeout waiting for fence|drivers/metal/rendering_device_driver_metal" \
            exported-capture.log > exported-capture.filtered.log || true
          if grep -qE "SCRIPT ERROR|^ERROR" exported-capture.filtered.log; then
            echo "::error::errors during the exported-client capture — frames may not depict a healthy world"
            grep -nE "SCRIPT ERROR|^ERROR" exported-capture.filtered.log | head -20
            exit 1
          fi
      - name: Capture the exported first-run UI
        # UNCONDITIONAL within this job, unlike the editor job's narrower
        # first_run gate: the paths that fire THIS job are exactly the ones
        # that gate does not watch — an export_presets.cfg change can filter
        # out assets or flip feature tags that only the character creator
        # depends on, while the seeded-save world capture above deliberately
        # keeps the creator out of frame. One extra run of the already-built
        # app is cheap next to the export this job already avoids repeating.
        run: |
          set -o pipefail
          # The save must be ABSENT here — its absence is precisely what makes
          # the creator open. Point at a path in the run's temp dir that was
          # never created; the tool fails closed if the creator does not
          # appear, so a stray save cannot silently turn this back into a
          # world shot.
          WAR_CAPTURE=1 \
          WAR_SCENARIO=first_run \
          WAR_SHOT_DIR="${RUNNER_TEMP}/exported-shots" \
          WAR_SAVE_PATH="${RUNNER_TEMP}/no_such_save.json" \
            "build/app/World at Ruin.app/Contents/MacOS/World at Ruin" 2>&1 | tee exported-first-run.log
          # Require the FIRST-RUN marker, not a bare PASS — the world scenario
          # prints "CAPTURE PASS" too, and its PNGs already sit in the same
          # directory, so a silent fall-back to the default scenario would
          # otherwise go green.
          if ! grep -qE "[0-9]+ first-run vantages? written" exported-first-run.log; then
            echo "::error::exported first-run capture did not report a first-run vantage — see log"; tail -40 exported-first-run.log; exit 1
          fi
          # Require the FULL expected set, for the editor job's reason: a
          # regression that dropped the lower-panel shot or the preset loop
          # would still report SOME number. The preset list is read from the
          # creator itself so adding a preset cannot leave CI checking the old
          # set; fail loudly if it cannot be parsed.
          presets=$(grep -oE 'const PRESETS := \[[^]]*\]' client/scripts/character_creator.gd \
            | grep -oE '"[a-z_]+"' | tr -d '"')
          if [ -z "$presets" ]; then
            echo "::error::could not read PRESETS from client/scripts/character_creator.gd — cannot tell which frames to require"
            exit 1
          fi
          expected="first_run first_run_lower"
          for p in $presets; do expected="$expected first_run_$p"; done
          missing=""
          for f in $expected; do
            [ -s "${RUNNER_TEMP}/exported-shots/$f.png" ] || missing="$missing $f.png"
          done
          if [ -n "$missing" ]; then
            echo "::error::exported first-run frames missing:$missing"
            ls -la "${RUNNER_TEMP}/exported-shots" || true
            exit 1
          fi
          echo "exported first-run frames present:$expected"
          # This run exercises the ABSENT-save branch, which the seeded world
          # capture never touches, so it needs its own boot proof.
          if ! grep -q "BOOT_OK" exported-first-run.log; then
            echo "::error::exported first-run capture never reached BOOT_OK — the frame depicts a partially booted game"
            tail -40 exported-first-run.log; exit 1
          fi
          grep -vE "timeout waiting for fence|drivers/metal/rendering_device_driver_metal" \
            exported-first-run.log > exported-first-run.filtered.log || true
          if grep -qE "SCRIPT ERROR|^ERROR" exported-first-run.filtered.log; then
            echo "::error::errors during the exported first-run capture"
            grep -nE "SCRIPT ERROR|^ERROR" exported-first-run.filtered.log | head -20
            exit 1
          fi
      - name: Frames actually exist
        # The tool fails closed on a uniform frame, but never trust a single
        # signal: confirm real files landed before advertising an artifact.
        run: |
          count=$(find "${RUNNER_TEMP}/exported-shots" -name '*.png' -size +10k | wc -l | tr -d ' ')
          if [ "$count" -lt 1 ]; then
            echo "::error::no non-trivial PNGs produced"; ls -la "${RUNNER_TEMP}/exported-shots" || true; exit 1
          fi
          echo "captured $count exported-client frame(s)"
      - name: Record what these frames can evidence
        # #232, same contract as the editor-project capture. This artifact is
        # published to reviewers exactly like the other one, and AGENTS.md now
        # tells them to read capture-conditions.txt beside the frames — so
        # omitting it here would make that promise half true, and the exported
        # frames the half with no stated rendering path.
        #
        # The exported client boots main.gd through WAR_CAPTURE, so it prints
        # the same Volumetrics.marker() line into its own log.
        run: |
          set -o pipefail
          # Same fail-closed reader as the editor-project capture: exactly one
          # DISTINCT verdict per marker, or refuse to publish a conditions file
          # that guesses.
          read_verdict() {
            marker="$1"; log="$2"
            distinct="$(grep -oE "^${marker} (on|off)([[:space:]]|\$)" "$log" \
              | sed -E "s/^${marker} //; s/[[:space:]]*\$//" | sort -u)"
            n="$(printf '%s\n' "$distinct" | grep -c . || true)"
            if [ "$n" -eq 0 ]; then
              echo "::error::no ${marker} verdict in ${log} — cannot tell what these frames depict" >&2
              return 1
            fi
            if [ "$n" -gt 1 ]; then
              echo "::error::contradictory ${marker} verdicts in ${log} ($(printf '%s' "$distinct" | tr '\n' '/')) — refusing to guess" >&2
              return 1
            fi
            printf '%s' "$distinct"
          }
          probe="$(read_verdict VOLUMETRICS exported-capture.log)" || exit 1
          pools="$(read_verdict 'HOLLOW FOG' exported-capture.log)" || exit 1
          echo "volumetric fog path: ${probe}; hollow ash pools: ${pools}"
          {
            echo "# Capture conditions (exported client)"
            echo
            echo "runner: ${RUNNER_OS} (hosted)"
            echo "volumetric_fog: ${probe}"
            echo "hollow_ash_pools: ${pools}"
            if [ "${probe}" = "off" ]; then
              echo
              echo "These frames show the HEIGHT-FOG FALLBACK, not the volumetric"
              echo "path: this runner's GPU lacks R32_Uint atomic storage image"
              echo "support, so Godot's froxel volumetrics never initialise here."
              echo "Nothing in this artifact evidences a change to volumetric fog."
            fi
            if [ "${pools}" = "off" ]; then
              echo
              echo "This world contains ZERO ash pools. Pools need the GPU probe"
              echo "AND the WAR_HOLLOW_FOG opt-in, and the capture sets neither"
              echo "by default. Nothing in this artifact evidences a change to"
              echo "the hollow ash pools."
            fi
          } > "${RUNNER_TEMP}/exported-shots/capture-conditions.txt"
          {
            echo "### Exported-client capture conditions"
            echo
            echo "Volumetric fog path: **${probe}** · hollow ash pools: **${pools}**"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: exported-frames-${{ github.event.pull_request.head.sha }}
          # .txt too: each frame's note travels with it, so a reviewer opening
          # a clamped capture can see it was the runner's display and not the
          # change under review that clipped the layout.
          path: |
            ${{ runner.temp }}/exported-shots/*.png
            ${{ runner.temp }}/exported-shots/*.txt
          if-no-files-found: error

  ci-required-checks:
    name: CI - Required Checks
    runs-on: ubuntu-latest
    # detect-visual-changes is in here for a reason that is easy to miss: it is
    # the GATE for frame-capture, so if it fails, frame-capture is skipped — and
    # aggregate-job-checks accepts a skip. A broken gate would therefore silently
    # drop the evidence requirement and still go green, which is the exact rot
    # #142 exists to prevent. Requiring the gate makes that failure loud.
    needs:
      [
        client-smoke,
        client-export-macos,
        license-guard,
        server-ci,
        detect-visual-changes,
        frame-capture,
        frame-capture-exported,
      ]
    if: ${{ always() }}
    steps:
      - uses: devantler-tech/actions/aggregate-job-checks@0f27c13a9785608e0bbf9998777d27761b4de617 # v10.0.2
        with:
          # frame-capture, frame-capture-exported and detect-visual-changes are
          # conditional and report `skipped` on PRs with no player-visible
          # change (and on merge_group). aggregate-job-checks treats skipped as
          # acceptable, so this does not block unrelated PRs — see the note on
          # ci-required-checks' needs. The two capture jobs are gated on
          # DIFFERENT outputs of that one gate (visual vs export_affecting), so
          # each can skip while the other runs; requiring the shared gate is
          # what keeps a broken gate from silently dropping either.
          job-results: >-
