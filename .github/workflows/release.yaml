---
name: Release

# Auto-release: every push to main runs semantic-release (create-release.yaml).
# Its commit-analyzer cuts a new vX.Y.Z tag only when the merged commits warrant
# one (fix: -> patch, feat: -> minor, BREAKING CHANGE/! -> major) and no-ops
# otherwise (chore:/docs:/ci:). Because .releaserc also loads
# @semantic-release/github with `draftRelease: true`, the same run creates a
# GitHub Release as a DRAFT. The pushed TAG is what triggers cd.yaml, which
# builds, attaches the artifact, and only then publishes the draft — the order
# forced by this org's immutable releases (see cd.yaml's header).
#
# The shared workflow runs semantic-release under a GitHub App token rather than
# GITHUB_TOKEN, which is what allows the resulting release to trigger cd.yaml at
# all -- a GITHUB_TOKEN-authored release never starts another workflow run.
on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: "Release"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: 🎉 Create Release
    uses: devantler-tech/actions/.github/workflows/create-release.yaml@adbda4a7309c6879c75e307c9c417965e640907e # v10.0.3
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
