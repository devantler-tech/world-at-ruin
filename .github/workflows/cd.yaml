---
name: CD

# Production build + publish, triggered by the tag that release.yaml's
# semantic-release run pushes.
#
# TWO CONSTRAINTS FORCE THIS SHAPE — both learned the hard way, so do not
# "simplify" the trigger back to a release event:
#
# 1. IMMUTABLE RELEASES. Once a release is published its assets are frozen and
#    `gh release upload` fails with `HTTP 422: Cannot upload assets to an
#    immutable release`. The order must be build -> attach -> publish, so the
#    release has to still be a DRAFT while this workflow runs. That is why
#    `.releaserc` sets `draftRelease: true`.
#
# 2. ACTIONS IGNORES DRAFT RELEASE EVENTS. `on: release: types: [created]`
#    looks like the natural pairing for (1), but the GitHub Actions docs state:
#    "Workflows are not triggered for the `created`, `edited`, or `deleted`
#    activity types for draft releases." A draft would therefore sit
#    unpublished forever. (This is an Actions-specific restriction — the
#    underlying *webhook* does fire for drafts, which makes it an easy thing to
#    get wrong from the webhook docs alone.)
#
# `push: tags` is the only trigger that both fires and leaves the release a
# draft — which is exactly why every other repo in the org uses it. The tag
# push triggers workflows because semantic-release runs under a GitHub App
# token, not GITHUB_TOKEN.
#
# Ordering note: semantic-release pushes the tag BEFORE its github plugin
# creates the draft release, so this workflow can start before the draft
# exists. The "wait for the draft" step below closes that race.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build and attach assets to, e.g. v0.2.0"
        required: true
        type: string

concurrency:
  group: "CD-${{ github.ref_name || inputs.tag }}"
  cancel-in-progress: false

permissions:
  contents: read

env:
  GODOT_VERSION: 4.7.1
  # macOS universal editor + export templates, same SHA512-SUMS.txt provenance
  # as ci.yaml's pins.
  GODOT_MACOS_SHA512: a5c6443e193829de9a3237b57ef5e01c23839888900e241543da0dd4bac1050125e19469f0cca9a9958ac346070d98cab8e5d6aee16b181c6d06cda86bd07224
  GODOT_TEMPLATES_SHA512: afcc83d8d3d298038f19c58744a0d660fa75dd4baa33cb55d1011bb2565a2a8c2381728924564cb909e37c205a23f21b521b23bd057993afd43ae4da0b2f9d47

jobs:
  publish-macos:
    name: 🍎 Publish macOS build
    # macOS runner on purpose: Godot's built-in AD-HOC codesign only works on a
    # macOS host, and an unsigned arm64 .app is killed by macOS before it can
    # launch — a Linux-exported unsigned zip would be dead on arrival on an
    # Apple-Silicon machine.
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read # build and exercise repo-controlled code without a release-write token
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 📑 Checkout the released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Check out the TAG explicitly, and FULLY QUALIFIED as refs/tags/*.
          # On a release event github.sha is not guaranteed to be the tagged
          # commit, and shipping a build from any other commit would silently
          # mislabel the release. The refs/tags/ prefix is load-bearing: for an
          # unqualified ref actions/checkout resolves origin/<ref> BEFORE
          # refs/tags/<ref>, so if a branch ever shared the tag's name (the
          # repo's branch-name rule permits e.g. a literal `v0.2.0` branch)
          # CD would build the BRANCH while attaching the asset to the tag's
          # release.
          ref: refs/tags/${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          # This job publishes an artifact — never let the checkout token ride
          # along in it (zizmor artipacked).
          persist-credentials: false

      - name: 🏷️ Resolve the release version
        id: version
        env:
          RAW_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          # The repo's "Protect release tags" ruleset pins tags to
          # ^v\d+\.\d+\.\d+(-.+)?$ — re-assert it here so a hand-typed
          # workflow_dispatch value cannot produce a mislabelled build.
          if ! printf '%s' "${RAW_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$'; then
            echo "::error::'${RAW_TAG}' is not a vX.Y.Z release tag"
            exit 1
          fi
          echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: ✍️ Stamp the release version into the build
        # The version is derived from the release tag, never hand-maintained.
        # Stamping happens HERE rather than as a commit back to main: a
        # commit-back would need write access to a protected branch and would
        # re-trigger release.yaml in a loop. The in-tree values stay the dev
        # values; only the shipped build carries the release version.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          perl -pi -e 's{^config/version=".*"$}{config/version="$ENV{VERSION}"}' client/project.godot
          perl -pi -e 's{^const VERSION := ".*"$}{const VERSION := "$ENV{VERSION}"}' client/scripts/devlog.gd
          # Fail loudly if either substitution missed — a silently unstamped
          # build would ship claiming the wrong version.
          grep -qxF "config/version=\"${VERSION}\"" client/project.godot \
            || { echo "::error::failed to stamp config/version in client/project.godot"; exit 1; }
          grep -qxF "const VERSION := \"${VERSION}\"" client/scripts/devlog.gd \
            || { echo "::error::failed to stamp VERSION in client/scripts/devlog.gd"; exit 1; }

      - name: ⬇️ Install Godot (pinned, checksum-verified)
        run: |
          set -euo pipefail
          curl -fsSL -o godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          echo "${GODOT_MACOS_SHA512}  godot.zip" | shasum -a 512 -c -
          unzip -q godot.zip
          printf '#!/bin/sh\nexec "%s/Godot.app/Contents/MacOS/Godot" "$@"\n' "${PWD}" | sudo tee /usr/local/bin/godot >/dev/null
          sudo chmod +x /usr/local/bin/godot

      - name: ⬇️ Install export templates (pinned, checksum-verified)
        run: |
          set -euo pipefail
          curl -fsSL -o templates.tpz "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          echo "${GODOT_TEMPLATES_SHA512}  templates.tpz" | shasum -a 512 -c -
          unzip -q templates.tpz
          mkdir -p "${HOME}/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mv templates/* "${HOME}/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable/"

      - name: 🧩 Headless import + class-name scan
        # Only the headless editor pass writes global_script_class_cache.cfg;
        # exporting without it breaks class_name resolution in packed scripts.
        run: |
          set -o pipefail
          godot --headless --editor --quit --path client 2>&1 | tee import.log

      - name: 🏗️ Export .app (release, ad-hoc signed)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          set -o pipefail
          mkdir -p build
          godot --headless --export-release "macOS" "${PWD}/build/WorldAtRuin-${VERSION}-macOS-universal.zip" --path client 2>&1 | tee export.log
          if grep -qE "SCRIPT ERROR|^ERROR" export.log import.log; then
            echo "::error::Errors during export"; exit 1
          fi
          test -s "build/WorldAtRuin-${VERSION}-macOS-universal.zip"

      - name: 🚦 Verify the EXPORTED app boots AND reports the release version
        # Boot the shipped artifact, not the editor build. BOOT_OK is main.gd's
        # positive marker that the world actually built; asserting the version
        # in that same line is what proves the stamp above reached the packed
        # binary rather than merely the working tree.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          set -o pipefail
          unzip -q "build/WorldAtRuin-${VERSION}-macOS-universal.zip" -d build/app
          "build/app/World at Ruin.app/Contents/MacOS/World at Ruin" --headless --quit-after 60 2>&1 | tee exported-smoke.log
          if grep -qE "SCRIPT ERROR|^ERROR" exported-smoke.log; then
            echo "::error::Errors booting the exported app"; exit 1
          fi
          if ! grep -q "BOOT_OK v${VERSION} " exported-smoke.log; then
            echo "::error::exported app did not report BOOT_OK v${VERSION} — the release version did not reach the shipped build"
            tail -20 exported-smoke.log
            exit 1
          fi

      - name: 🧾 Record the artifact checksum
        id: sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          SHA=$(shasum -a 256 "build/WorldAtRuin-${VERSION}-macOS-universal.zip" | cut -d' ' -f1)
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}"

      - name: 📎 Hand the build to the GHCR job
        # The GHCR job cannot read the release: it is still a DRAFT at that
        # point, and GitHub only exposes draft releases to tokens with PUSH
        # access ("Only users with push access will receive listings for draft
        # releases"; get-by-tag is documented as returning a *published*
        # release). Passing the file as a workflow artifact keeps that job on
        # `contents: read` instead of widening it to write purely to read back
        # what we just built — and it is the same file object, so byte-identity
        # with the release asset holds by construction rather than by a
        # round-trip that could itself go wrong.
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: client-macos-universal
          path: build/WorldAtRuin-${{ steps.version.outputs.version }}-macOS-universal.zip
          if-no-files-found: error
          retention-days: 1

  attach-release:
    name: 📤 Attach macOS build to release
    # This job is the credential boundary between repo-controlled build/runtime
    # code and the release-write token. It never checks out or executes the tag;
    # it only receives the inert build artifact and attaches it to the draft.
    needs: [publish-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # attach the completed artifact to the draft release
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 📎 Receive the macOS build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-macos-universal
          path: build

      - name: ⏳ Wait for the draft release to exist
        # semantic-release pushes the tag (which triggered this run) BEFORE its
        # github plugin creates the draft release, so the draft can lag this
        # workflow by a few seconds. Poll rather than assume; fail closed with a
        # clear message if it never appears, so a missing draft can never be
        # mistaken for a successful publish.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json tagName >/dev/null 2>&1; then
              echo "release ${TAG} is present"
              exit 0
            fi
            sleep 10
          done
          echo "::error::no release found for ${TAG} after 5 minutes — semantic-release should have created it as a draft (.releaserc draftRelease). Nothing was published."
          exit 1

      - name: 📤 Attach the build to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          if ! printf '%s' "${TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$'; then
            echo "::error::'${TAG}' is not a vX.Y.Z release tag"
            exit 1
          fi

          # Query draft state separately and retry transient API failures. A
          # failed query must never be misreported as an immutable release.
          IS_DRAFT=""
          for attempt in 1 2 3; do
            if IS_DRAFT="$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft')"; then
              break
            fi
            IS_DRAFT=""
            [ "${attempt}" -lt 3 ] && sleep 5
          done

          if [ -z "${IS_DRAFT}" ]; then
            echo "::error::could not read the draft state of ${TAG} after 3 attempts. Nothing was published; ${TAG} is unchanged. This is a failed API call, NOT a published release — re-run this workflow."
            exit 1
          fi

          if [ "${IS_DRAFT}" != "true" ]; then
            echo "::error::${TAG} is already published — assets cannot be attached to an immutable release. The release must still be a draft when CD runs (see .releaserc draftRelease)."
            exit 1
          fi

          ASSET="build/WorldAtRuin-${TAG#v}-macOS-universal.zip"
          if [ ! -f "${ASSET}" ]; then
            echo "::error::${ASSET} does not exist — the build job did not hand off the expected artifact."
            exit 1
          fi

          # Retain the release-upload retry budget: a transient upload failure
          # strands an otherwise-complete immutable release as a draft.
          ATTEMPTS=5
          DELAY=15
          for attempt in $(seq 1 "${ATTEMPTS}"); do
            if gh release upload "${TAG}" "${ASSET}" \
              --repo "${GITHUB_REPOSITORY}" --clobber; then
              if [ "${attempt}" -gt 1 ]; then
                echo "uploaded ${ASSET} to ${TAG} on attempt ${attempt}/${ATTEMPTS}"
              fi
              exit 0
            fi
            if [ "${attempt}" -lt "${ATTEMPTS}" ]; then
              echo "attempt ${attempt}/${ATTEMPTS} to upload ${ASSET} failed; retrying in ${DELAY}s"
              sleep "${DELAY}"
              DELAY=$((DELAY * 2))
            fi
          done
          echo "::error::failed to attach ${ASSET} to ${TAG} after ${ATTEMPTS} attempts. Nothing was published; ${TAG} is still a draft."
          exit 1

  publish-ghcr:
    name: 📦 Publish OCI artifact to GHCR
    # The ORIGIN OF RECORD for the in-client updater (docs/design/
    # distribution-and-self-update.md, #62). The GitHub Release asset is a plain
    # HTTP download with no content addressing; the updater pins a DIGEST, which
    # is what an OCI registry gives us.
    #
    # Why OCI and not some other GitHub Packages registry: there isn't one.
    # GitHub Packages' registries (npm, NuGet, Maven, RubyGems) are all
    # ecosystem-specific and none accepts an arbitrary binary, so an OCI
    # artifact via ghcr.io is the only way a .app zip enters GitHub Packages.
    #
    # Runs on ubuntu (not the macOS runner that built it) and re-downloads the
    # published asset: this job needs no Godot toolchain, and pulling the
    # RELEASE asset — rather than a runner-local file — proves we publish
    # exactly the bytes a player would download.
    # Preserve the old fail-closed sequence: never expose an OCI update until
    # the same build has been attached successfully to its draft release.
    needs: [publish-macos, attach-release]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # download the published release asset
      packages: write # push the OCI artifact
      id-token: write # keyless cosign signing via GitHub OIDC
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🏷️ Resolve the release version
        id: version
        env:
          RAW_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          if ! printf '%s' "${RAW_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$'; then
            echo "::error::'${RAW_TAG}' is not a vX.Y.Z release tag"
            exit 1
          fi
          echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: ⬇️ Fetch the build from the macOS job
        # Deliberately NOT `gh release download`: the release is still a draft
        # here, and draft releases are only visible to tokens with push access —
        # this job has `contents: read` by design and should not be widened to
        # write just to read back a file we already built.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-macos-universal
          path: oci

      - name: 🧾 Confirm the build matches what was attached to the release
        # The upstream job's checksum, asserted across the job boundary — so a
        # truncated or swapped artifact transfer fails here rather than silently
        # publishing different bytes to GHCR than the release carries.
        env:
          VERSION: ${{ steps.version.outputs.version }}
          EXPECTED: ${{ needs.publish-macos.outputs.sha256 }}
        run: |
          set -euo pipefail
          cd oci
          ACTUAL=$(sha256sum "WorldAtRuin-${VERSION}-macOS-universal.zip" | cut -d' ' -f1)
          if [ -z "${EXPECTED}" ]; then
            echo "::error::no checksum was published by the build job — cannot prove the artifact is the released build"
            exit 1
          fi
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "::error::artifact checksum mismatch — build job produced ${EXPECTED}, this job received ${ACTUAL}"
            exit 1
          fi
          echo "${ACTUAL}  WorldAtRuin-${VERSION}-macOS-universal.zip" > ../release-asset.sha256
          echo "checksum matches the build attached to the release: ${ACTUAL}"

      - name: 🔧 Set up ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2.0.1

      - name: 🔏 Set up cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GH_TOKEN }}

      - name: 📦 Push the OCI artifact
        id: push
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          # Registry paths must be lowercase. `tr` rather than bash's ${VAR@L}
          # so this does not silently depend on bash >= 4.4.
          ARTIFACT="$(printf 'ghcr.io/%s/client' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          cd oci
          # Bare version (v stripped) plus `latest`, mirroring the convention in
          # devantler-tech/actions' publish-manifests.
          oras push "${ARTIFACT}:${VERSION}" \
            --artifact-type application/vnd.devantler.worldatruin.client.v1+zip \
            --annotation "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --annotation "org.opencontainers.image.version=${VERSION}" \
            --annotation "org.opencontainers.image.revision=${GITHUB_SHA}" \
            "WorldAtRuin-${VERSION}-macOS-universal.zip:application/zip"
          oras tag "${ARTIFACT}:${VERSION}" latest
          # `oras manifest fetch --descriptor` rather than `oras resolve`: the
          # latter is marked [Preview] and `--format` is [Experimental], so both
          # can change under us. This form is stable.
          DIGEST=$(oras manifest fetch --descriptor "${ARTIFACT}:${VERSION}" | jq -r '.digest')
          if ! printf '%s' "${DIGEST}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "::error::could not resolve a digest for ${ARTIFACT}:${VERSION} (got '${DIGEST}')"
            exit 1
          fi
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "pushed ${ARTIFACT}:${VERSION} @ ${DIGEST}"

      - name: 🔏 Sign the artifact by digest
        env:
          ARTIFACT: ${{ steps.push.outputs.artifact }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          # Sign the DIGEST, never the mutable tag — the digest is what the
          # updater pins, so it is what the signature must cover.
          cosign sign --yes "${ARTIFACT}@${DIGEST}"

      - name: ✅ Verify signature and byte-identity
        env:
          ARTIFACT: ${{ steps.push.outputs.artifact }}
          DIGEST: ${{ steps.push.outputs.digest }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          cosign verify "${ARTIFACT}@${DIGEST}" \
            --certificate-identity-regexp "^${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            > /dev/null
          echo "signature verified for ${ARTIFACT}@${DIGEST}"
          # Pull the artifact back and prove the stored bytes match the release
          # asset exactly. A push that silently truncated or re-encoded would
          # otherwise ship a build nobody had checked.
          mkdir -p pulled && cd pulled
          oras pull "${ARTIFACT}@${DIGEST}"
          sha256sum -c <(sed "s#  .*#  WorldAtRuin-${VERSION}-macOS-universal.zip#" ../release-asset.sha256)
          echo "pulled bytes are identical to the release asset"

    outputs:
      artifact: ${{ steps.push.outputs.artifact }}
      digest: ${{ steps.push.outputs.digest }}

  verify-ghcr-public:
    name: 🌍 Verify GHCR is anonymously pullable
    # THE check that matters for a player-facing origin, and the easiest one to
    # fake: every step in publish-ghcr runs authenticated (docker/login-action +
    # GITHUB_TOKEN), so none of them prove public reachability. GHCR creates
    # packages PRIVATE by default and that failure is invisible from the
    # publishing side — the push succeeds and only the player gets a 401. So
    # this job deliberately uses NO credentials at all: no login step, no token.
    # "Fix" it by adding credentials and you have restored a guard that passes
    # vacuously.
    #
    # DELIBERATELY NOT A DEPENDENCY OF publish-release (maintainer direction
    # 2026-07-18). Nothing consumes GHCR yet — the in-client updater is not
    # wired to it — so a private package harms no player today, whereas blocking
    # every release on it would. This job going red is the loud signal; the
    # release still ships. **Make this blocking the moment the updater actually
    # resolves against GHCR** (tracked as #141): from then on, a
    # release whose update origin is unreachable is a real defect.
    needs: [publish-ghcr]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {} # no credentials by design
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🌍 Anonymous pull check
        env:
          ARTIFACT: ${{ needs.publish-ghcr.outputs.artifact }}
          DIGEST: ${{ needs.publish-ghcr.outputs.digest }}
        run: |
          set -euo pipefail
          # Strip the registry host to get the repository path for the token/v2 API.
          REPO_PATH="${ARTIFACT#ghcr.io/}"
          # Anonymous pull token — no Authorization header, no docker config.
          TOKEN=$(curl -fsS "https://ghcr.io/token?scope=repository:${REPO_PATH}:pull&service=ghcr.io" | jq -r '.token')
          CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.oci.image.manifest.v1+json,application/vnd.oci.image.index.v1+json" \
            "https://ghcr.io/v2/${REPO_PATH}/manifests/${DIGEST}")
          echo "anonymous manifest fetch: HTTP ${CODE}"
          if [ "${CODE}" != "200" ]; then
            echo "::error::${ARTIFACT} is NOT anonymously pullable (HTTP ${CODE}). GHCR packages are private by default, so a player's client cannot fetch updates from it. Fix: GitHub → Packages → world-at-ruin/client → Package settings → Change visibility → Public. The release itself still published (this check is intentionally non-blocking while nothing consumes GHCR), so nothing is broken for players today — but the update origin is not yet usable."
            exit 1
          fi
          echo "${ARTIFACT}@${DIGEST} is publicly reachable with no credentials"

  publish-release:
    name: 🚀 Publish the release
    # SEPARATE, LAST, AND DEPENDENT ON THE ARTIFACT JOBS. The draft becomes
    # public only once the build is attached AND the GHCR origin exists and is
    # signed. Publishing earlier would leave a public, immutable release whose
    # update origin does not exist — and since releases are immutable, that is
    # not repairable afterwards.
    #
    # This is the same shape the org's Go repos get from GoReleaser
    # (`release: draft: true` + publish only after every asset job succeeds).
    needs: [attach-release, publish-ghcr]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # flip the release out of draft
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🚀 Publish the release
        # Emits `published`, which is deliberately not a CD trigger, so this
        # cannot re-enter the workflow.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          gh release edit "${TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false
          # Verify rather than trust the command's exit code.
          state=$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json isDraft,assets \
            --jq '"draft=\(.isDraft) assets=\(.assets|length)"')
          echo "${TAG}: ${state}"
          case "${state}" in
            "draft=false assets=0") echo "::error::${TAG} published with NO assets"; exit 1 ;;
            "draft=false assets="*) ;;
            *) echo "::error::${TAG} did not publish"; exit 1 ;;
          esac

  homebrew-cask:
    name: 🍺 Publish Homebrew cask
    # AFTER publish-release, not before: the cask's `url` points at the RELEASE
    # ASSET, and a draft release's asset URL 404s for `brew install`. Opening
    # the cask PR while the release is still a draft would publish a recipe that
    # cannot install.
    #
    # NOTE ON `auto_updates`: deliberately ABSENT. It tells Homebrew "this app
    # updates itself, do not upgrade it" — and World at Ruin has NO working
    # in-client updater yet (client/scripts/update_decision.gd is pure decision
    # logic; the Tier-1 pack pipeline of docs/design/distribution-and-self-update.md
    # is designed, not built). Declaring it now would make `brew upgrade` skip the
    # cask and strand every player on the version they installed. Add it only
    # once the self-updater actually ships (see #106).
    needs: [publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Serialize the tap handoff ACROSS tags. The workflow-level concurrency
    # group is per-tag so release builds can overlap, but this job mutates
    # shared tap state (the evergreen branch, ONE PR, its title, its
    # auto-merge arm), and every cross-run interleaving of
    # disarm→write→retitle→arm is a race: a preflight disarm check is a
    # TOCTOU the moment a sibling run can arm between the check and the
    # content PUT (Codex round 4 on #197; rounds 1–3 each found one more
    # such interleaving). One tap job at a time makes the sequence atomic
    # with respect to sibling releases and kills the family at the root; the
    # in-job convergence/disarm logic stays as defense against manual
    # actors. Trade-off, so a red run here is not misdiagnosed: if THREE
    # releases stack inside one tap-job runtime (~seconds), GitHub cancels
    # the middle PENDING job — that cancellation means "superseded", and the
    # newest run delivers its content via the monotonic compare-and-swap.
    concurrency:
      group: homebrew-tap-cask-world-at-ruin
      cancel-in-progress: false
    permissions:
      contents: read # read the published release asset
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🏷️ Resolve the release version
        id: version
        env:
          RAW_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          set -euo pipefail
          if ! printf '%s' "${RAW_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$'; then
            echo "::error::'${RAW_TAG}' is not a vX.Y.Z release tag"
            exit 1
          fi
          echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: 🔑 Require the tap token
        # Fail with a diagnosis rather than a bare auth error from `gh` later.
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::error::HOMEBREW_GITHUB_API_TOKEN is not available to this repository. The cask cannot be published to devantler-tech/homebrew-tap without it. The release itself is unaffected."
            exit 1
          fi

      - name: 🧮 Checksum the published asset
        id: asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          asset="WorldAtRuin-${VERSION}-macOS-universal.zip"
          # Download from the PUBLIC release URL, the same one the cask will use,
          # so a broken/404 URL fails here rather than in a player's `brew install`.
          url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${TAG}/${asset}"
          curl -fsSL --retry 3 -o "$asset" "$url"
          {
            echo "sha256=$(sha256sum "$asset" | cut -d' ' -f1)"
            echo "asset=${asset}"
            echo "url=${url}"
          } >> "$GITHUB_OUTPUT"

      - name: 🍺 Render the cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.asset.outputs.sha256 }}
        run: |
          set -euo pipefail
          mkdir -p Casks
          cat > Casks/world-at-ruin.rb <<CASK
          # This file is generated by World at Ruin's CD workflow. DO NOT EDIT.
          cask "world-at-ruin" do
            version "${VERSION}"
            sha256 "${SHA256}"

            # No verified: parameter here. brew audit --strict rejects it when
            # the download domain matches the homepage domain, which it does
            # here (both github.com). ksail needs it only because its homepage
            # is a separate site.
            url "https://github.com/devantler-tech/world-at-ruin/releases/download/v#{version}/WorldAtRuin-#{version}-macOS-universal.zip"
            name "World at Ruin"
            desc "Cloud-native MMORPG built almost entirely by agents"
            homepage "https://github.com/devantler-tech/world-at-ruin/"

            livecheck do
              skip "Auto-generated on release."
            end

            depends_on macos: :big_sur

            app "World at Ruin.app"

            postflight do
              # The build is AD-HOC signed (Godot's built-in codesign, no
              # Developer ID), so Gatekeeper quarantines it on download and it
              # will not launch without this.
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/World at Ruin.app"]
            end

            uninstall quit: "tech.devantler.worldatruin"

            zap trash: "~/Library/Application Support/Godot/app_userdata/World at Ruin"
          end
          CASK
          echo "--- rendered cask ---"
          cat Casks/world-at-ruin.rb

      - name: 📤 Open, update, and arm the tap PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Evergreen branch: a new release updates the ONE open cask PR in place
          # rather than stacking a new PR per release (the tap convention).
          branch="goreleaser/world-at-ruin"
          tap="devantler-tech/homebrew-tap"
          content="$(base64 -w0 < Casks/world-at-ruin.rb)"

          # A fork can use the same branch name, so never select a PR by ref
          # alone. Ask GitHub for the tap owner's head and then fail closed by
          # checking the returned PR's head repository and ref ourselves.
          trusted_open_pr() {
            gh api --method GET "repos/${tap}/pulls" \
              -f state=open -f "head=devantler-tech:${branch}" -f per_page=100 \
              | jq -r --arg tap "${tap}" --arg branch "${branch}" \
                '[.[] | select(.head.repo.full_name == $tap and .head.ref == $branch)] | .[0].number // empty'
          }

          base_sha="$(gh api "repos/${tap}/git/ref/heads/main" --jq '.object.sha')"
          # Tolerate a concurrent creator: two runs can both see the branch
          # missing and race this POST; the loser gets 422 and must NOT die
          # under `set -e` before reaching the compare-and-swap below.
          if ! gh api "repos/${tap}/git/ref/heads/${branch}" >/dev/null 2>&1; then
            gh api "repos/${tap}/git/refs" -X POST -f ref="refs/heads/${branch}" \
              -f sha="${base_sha}" >/dev/null 2>&1 || true
            if ! gh api "repos/${tap}/git/ref/heads/${branch}" >/dev/null 2>&1; then
              echo "::error::could not create or find ${branch} on ${tap}"
              exit 1
            fi
          fi

          # DISARM before touching the branch. Auto-merge armed by a previous
          # release survives pushes, so if this job died between the content
          # PUT below and the title-convergence loop, GitHub would finish the
          # new head's checks and squash-merge it under the PREVIOUS
          # version's title — with no process left to repair the changelog.
          # Disarmed, a crash merely leaves the PR unmerged until the next
          # run's convergence loop re-arms it (the recovery path below).
          # Fail-closed: writing new content while the PR stays armed is the
          # hazard, so a failed disarm aborts the job.
          pre_pr="$(trusted_open_pr)"
          if [ -n "${pre_pr}" ]; then
            pre_state="$(gh api "repos/${tap}/pulls/${pre_pr}")"
            if [ "$(printf '%s' "${pre_state}" | jq -r '.auto_merge != null')" = "true" ]; then
              pre_node="$(printf '%s' "${pre_state}" | jq -r '.node_id')"
              disarm_mutation="mutation(\$id: ID!) { disablePullRequestAutoMerge(input: { pullRequestId: \$id }) { pullRequest { number } } }"
              if ! gh api graphql -f query="${disarm_mutation}" -F id="${pre_node}" >/dev/null; then
                echo "::error::could not disarm auto-merge on ${tap}#${pre_pr} before updating ${branch}"
                exit 1
              fi
              echo "disarmed auto-merge on ${tap}#${pre_pr} before updating ${branch}"
            fi
          fi

          # MONOTONIC GUARD, as a COMPARE-AND-SWAP. The workflow concurrency
          # group is per TAG, so two CD runs for different releases do not
          # serialise, and nothing else locks this shared tap branch. Releases
          # here are frequent enough for that to be a real race.
          #
          # Version and blob SHA must come from the SAME read: reading them
          # separately leaves a window where a newer run writes in between, so
          # this run sees the OLD version but the NEW sha and its PUT succeeds,
          # downgrading the tap. Taking both from one response makes the PUT a
          # compare-and-swap — if the branch moved, the sha is stale and GitHub
          # rejects the write, and we re-read and re-decide.
          for attempt in 1 2 3 4 5; do
            resp="$(gh api "repos/${tap}/contents/Casks/world-at-ruin.rb?ref=${branch}" 2>/dev/null || true)"
            if [ -n "${resp}" ]; then
              existing="$(printf '%s' "${resp}" | jq -r '.sha')"
              current="$(printf '%s' "${resp}" | jq -r '.content' | base64 -d \
                         | sed -n 's/^  version "\(.*\)"$/\1/p' | head -1)"
            else
              existing=""
              current=""
            fi

            if [ -n "${current}" ] && [ "${current}" != "${VERSION}" ]; then
              # SemVer precedence, NOT `sort -V`: the tag pattern accepts
              # prereleases, and `sort -V` orders 1.0.0-rc.1 ABOVE 1.0.0, so a
              # late prerelease run would downgrade a final release. Under
              # SemVer a prerelease precedes its own final release.
              core_a="${current%%-*}"; core_b="${VERSION%%-*}"
              case "${current}" in *-*) pre_a="${current#*-}";; *) pre_a="";; esac
              case "${VERSION}" in *-*) pre_b="${VERSION#*-}";; *) pre_b="";; esac
              if [ "${core_a}" != "${core_b}" ]; then
                if [ "$(printf '%s\n%s\n' "${core_a}" "${core_b}" | sort -V | tail -1)" = "${core_a}" ]; then
                  newest="${current}"; else newest="${VERSION}"; fi
              elif [ -z "${pre_a}" ]; then newest="${current}"
              elif [ -z "${pre_b}" ]; then newest="${VERSION}"
              else
                # SemVer item 11: compare dot-separated identifiers left to
                # right. Numeric identifiers compare numerically; non-numeric
                # compare ASCII; a NUMERIC identifier has LOWER precedence than
                # a non-numeric one (so alpha.1 < alpha.beta, which `sort -V`
                # gets backwards); if all shared identifiers are equal, the
                # version with MORE identifiers wins.
                newest=""
                IFS='.' read -r -a ids_a <<< "${pre_a}"
                IFS='.' read -r -a ids_b <<< "${pre_b}"
                n=$(( ${#ids_a[@]} > ${#ids_b[@]} ? ${#ids_a[@]} : ${#ids_b[@]} ))
                for ((k=0; k<n; k++)); do
                  ia="${ids_a[k]-}"; ib="${ids_b[k]-}"
                  if [ -z "${ia}" ]; then newest="${VERSION}"; break; fi
                  if [ -z "${ib}" ]; then newest="${current}"; break; fi
                  [ "${ia}" = "${ib}" ] && continue
                  if [[ "${ia}" =~ ^[0-9]+$ ]] && [[ "${ib}" =~ ^[0-9]+$ ]]; then
                    if [ "${ia}" -gt "${ib}" ]; then newest="${current}"; else newest="${VERSION}"; fi
                  elif [[ "${ia}" =~ ^[0-9]+$ ]]; then
                    newest="${VERSION}"   # numeric < non-numeric
                  elif [[ "${ib}" =~ ^[0-9]+$ ]]; then
                    newest="${current}"
                  elif [[ "${ia}" > "${ib}" ]]; then newest="${current}"
                  else newest="${VERSION}"; fi
                  break
                done
                [ -z "${newest}" ] && newest="${current}"
              fi
              if [ "${newest}" = "${current}" ]; then
                # A newer release already owns the branch content. Do NOT exit
                # the step: the PR-open/title/auto-merge block below must still
                # run — the newer run can have died between its content write
                # and its PR step, and every path must leave the PR open and
                # armed. `break` skips only the PUT.
                echo "::notice::tap already carries ${current}, which is newer than ${VERSION} — leaving its content alone"
                break
              fi
            fi

            if [ -n "${existing}" ]; then
              args=(-f "sha=${existing}")
            else
              args=()
            fi
            if gh api "repos/${tap}/contents/Casks/world-at-ruin.rb" -X PUT \
                 -f message="chore(cask): update world-at-ruin to v${VERSION}" -f content="${content}" \
                 -f branch="${branch}" "${args[@]}" >/dev/null 2>&1; then
              echo "wrote world-at-ruin ${VERSION} to ${branch}"
              break
            fi
            if [ "${attempt}" = "5" ]; then
              echo "::error::could not update the cask on ${branch} after 5 attempts — the branch kept moving under us"
              exit 1
            fi
            echo "::notice::${branch} moved while writing; re-reading and re-deciding (attempt ${attempt})"
            sleep 3
          done

          # `// empty` is load-bearing: with no open PR, `jq '.[0].number'`
          # prints the literal `null`, which `grep -q .` MATCHES — so the check
          # would conclude a PR already exists and never create one, leaving the
          # job green with no tap PR at all on the very first run.
          #
          # Racy too: two runs can both see no open PR, and `gh pr create` errors
          # if one already exists — failing this job over a benign overlap.
          # Tolerate the loss, then re-check so a genuine failure still errors.
          # Helper: the cask version carried by a ref, empty when the file or
          # ref is missing.
          cask_version_at() {
            gh api "repos/${tap}/contents/Casks/world-at-ruin.rb?ref=${1}" 2>/dev/null \
              | jq -r '.content // empty' | base64 -d 2>/dev/null \
              | sed -n 's/^  version "\(.*\)"$/\1/p' | head -1 || true
          }

          if ! trusted_open_pr | grep -q .; then
            # ALREADY DELIVERED is success, not a missing PR: a stale rerun
            # (an older tag re-run after the newer release's PR merged) finds
            # the branch content already on main and no open PR. GitHub
            # refuses a PR from a fully-merged branch ("no commits between"),
            # so without this check a valid no-op rerun would die on the
            # ensure-PR error below.
            branch_now="$(cask_version_at "${branch}")"
            main_now="$(cask_version_at main)"
            if [ -n "${branch_now}" ] && [ "${branch_now}" = "${main_now}" ]; then
              echo "::notice::${tap} main already carries v${main_now} and no cask PR is open — nothing to deliver"
              exit 0
            fi
            gh pr create --repo "${tap}" --base main --head "${branch}" \
              --title "chore(cask): update world-at-ruin to v${VERSION}" \
              --body "Automated cask update for World at Ruin. Programmed release path: check-gated auto-merge, no review needed." || true
            if ! trusted_open_pr | grep -q .; then
              echo "::error::no open cask PR on ${tap} for ${branch} after attempting to create one"
              exit 1
            fi
          fi
          pr="$(trusted_open_pr)"
          echo "cask PR is open on ${tap} (#${pr}, ${branch})"

          # Title convergence + arming. The title must state the version the
          # branch CONTENT actually carries, never this run's ${VERSION}: a
          # concurrent newer release can win the compare-and-swap above (or
          # this run is the stale one that skipped its write), and the tap
          # squash-merges on the PR title — a stale title ships a changelog
          # entry for a version the diff does not deliver (live case:
          # tap#1213 titled 0.16.0 while its branch carried 0.21.0). The
          # version is re-derived INSIDE the loop and re-verified after the
          # retitle: without that, a stale run's PATCH could be the LAST
          # title write after a newer run already armed auto-merge — the
          # lying-title merge this exists to prevent. When the re-read shows
          # the branch moved, loop and re-derive.
          #
          # Arm auto-merge so the PR merges the moment the tap's required
          # checks (audit + style + script tests) pass — no agent or human in
          # the loop (maintainer direction 2026-07-18; #169). This is the same
          # check-gated flow the tap already runs for dependency bots; the org
          # enable-auto-merge workflow cannot arm these PRs because its
          # eligibility keys on allowlisted BOT authors and this PR is
          # authored by the tap token. Arming is deliberately not head-bound:
          # the content is monotonic (compare-and-swap above), auto-merge
          # survives follow-up pushes, and the checks always gate the final
          # head. Failures are LOUD — a cask PR that silently never merges is
          # exactly how the tap fell six releases behind (#169).
          armed=false
          for attempt in 1 2 3 4 5; do
            branch_version="$(cask_version_at "${branch}")"
            if [ -z "${branch_version}" ]; then
              echo "::error::could not read the cask version back from ${branch}"
              exit 1
            fi
            title="chore(cask): update world-at-ruin to v${branch_version}"
            pr_state="$(gh api "repos/${tap}/pulls/${pr}")"
            if [ "$(printf '%s' "${pr_state}" | jq -r '.title')" != "${title}" ]; then
              gh api -X PATCH "repos/${tap}/pulls/${pr}" -f title="${title}" >/dev/null
              echo "retitled ${tap}#${pr}: ${title}"
            fi
            # Verify the content the title was derived from is still current;
            # a moved branch means a newer run is writing — re-derive rather
            # than leave its title stale-overwritten.
            if [ "$(cask_version_at "${branch}")" != "${branch_version}" ]; then
              echo "::notice::${branch} moved during retitle; re-deriving (attempt ${attempt})"
              sleep 2
              continue
            fi
            if [ "$(printf '%s' "${pr_state}" | jq -r '.merged')" = "true" ]; then
              echo "${tap}#${pr} already merged"
              armed=true
              break
            fi
            if [ "$(printf '%s' "${pr_state}" | jq -r '.auto_merge != null')" = "true" ]; then
              echo "auto-merge already armed on ${tap}#${pr}"
              armed=true
              break
            fi
            pr_node="$(printf '%s' "${pr_state}" | jq -r '.node_id')"
            # `\$id` is escaped so the shell leaves it literal: it is a
            # GraphQL variable, not a shell one. GraphQL directly (not
            # `gh pr merge --auto`): the gh subcommand resolves the viewer's
            # `login`, a scope the tap token lacks — the same trap that
            # stranded ksail's cask PRs as drafts (ksail#6134).
            mutation="mutation(\$id: ID!) { enablePullRequestAutoMerge(input: { pullRequestId: \$id, mergeMethod: SQUASH }) { pullRequest { number } } }"
            if out="$(gh api graphql -f query="${mutation}" -F id="${pr_node}" 2>&1)"; then
              echo "auto-merge armed on ${tap}#${pr}"
            elif printf '%s' "${out}" | grep -qi 'clean status'; then
              # Every required check is already green, so GitHub refuses to
              # arm (nothing left to wait for) — merge directly instead,
              # BOUND to the head this iteration read (`sha` is the REST
              # merge endpoint's head-must-match guard): without it, a newer
              # head pushed after the clean-status result would merge before
              # its checks run — the tap token can bypass rulesets, so the
              # endpoint would not stop it. A moved head is refused and
              # re-enters the loop.
              if gh api -X PUT "repos/${tap}/pulls/${pr}/merge" \
                   -f merge_method=squash \
                   -f sha="$(printf '%s' "${pr_state}" | jq -r '.head.sha')" >/dev/null 2>&1; then
                echo "checks were already green — merged ${tap}#${pr} directly"
                armed=true
                break
              fi
              sleep 2
              continue
            elif printf '%s' "${out}" | grep -qi 'already.*enabled'; then
              echo "auto-merge already armed on ${tap}#${pr}"
            else
              echo "::error::could not arm auto-merge on ${tap}#${pr}: ${out}"
              exit 1
            fi
            # Armed — but the mutation is not content-bound: a newer run can
            # push between this iteration's verify and the arming, so the arm
            # now covers content the verified title was NOT derived from. If
            # that newer run dies before its own retitle (exactly the crash
            # window the fall-through above exists for), checks eventually
            # pass and auto-merge ships the stale title. Re-read; when the
            # branch moved, loop — the next iteration re-derives the title
            # and exits through the already-armed path.
            if [ "$(cask_version_at "${branch}")" = "${branch_version}" ]; then
              armed=true
              break
            fi
            echo "::notice::${branch} moved while arming; re-deriving the title (attempt ${attempt})"
            sleep 2
          done
          if [ "${armed}" != "true" ]; then
            echo "::error::could not arm auto-merge or merge ${tap}#${pr} after 5 attempts"
            exit 1
          fi

  cd-required-checks:
    name: CD - Required Checks
    runs-on: ubuntu-latest
    needs:
      [
        publish-macos,
        attach-release,
        publish-ghcr,
        verify-ghcr-public,
        publish-release,
        homebrew-cask,
      ]
    if: ${{ always() }}
    steps:
      - uses: devantler-tech/actions/aggregate-job-checks@0f27c13a9785608e0bbf9998777d27761b4de617 # v10.0.2
        with:
          job-results: >-
            ${{ needs.publish-macos.result }}
            ${{ needs.attach-release.result }}
            ${{ needs.publish-ghcr.result }}
            ${{ needs.verify-ghcr-public.result }}
            ${{ needs.publish-release.result }}
            ${{ needs.homebrew-cask.result }}
          check-name: "CD - Required Checks"
